<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Fareed Office | مكتب الفريد للخدمات</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #5e35b1; margin-bottom: 1.5rem; }
        .status {
            padding: 10px;
            margin-bottom: 1rem;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        
        #auth-btn {
            background-color: #5e35b1;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            display: none; /* سيظهر عند نجاح الـ Init */
            width: 100%;
            transition: background 0.3s;
        }
        #auth-btn:hover { background-color: #4527a0; }
        
        #user-info {
            display: none;
            margin-top: 20px;
            text-align: right;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .info-item { margin-bottom: 10px; font-weight: bold; }
        span { font-weight: normal; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>مكتب الفريد للخدمات</h1>
    
    <div id="status-box" class="status status-loading">جاري تهيئة الشبكة...</div>
    
    <button id="auth-btn">تسجيل الدخول عبر Pi</button>

    <div id="user-info">
        <div class="info-item">اسم المستخدم: <span id="user-name"></span></div>
        <div class="info-item">المعرف (UID): <span id="user-addr"></span></div>
    </div>
</div>

<script>
    const statusBox = document.getElementById('status-box');
    const authBtn = document.getElementById('auth-btn');
    const userInfo = document.getElementById('user-info');
    const userName = document.getElementById('user-name');
    const userAddr = document.getElementById('user-addr');

    // التأكد من تحميل المكتبة
    const Pi = window.Pi;

    async function initPi() {
        try {
            // تهيئة التطبيق (استخدم sandbox: true للتجربة)
            await Pi.init({ version: "2.0", sandbox: true });
            
            statusBox.innerText = "متصل ببيئة الشبكة";
            statusBox.className = "status status-success";
            authBtn.style.display = "block";
            
        } catch (e) {
            statusBox.innerText = "خطأ في تحميل الشبكة";
            statusBox.className = "status status-error";
            console.error("Initialization Error:", e);
        }
    }

    authBtn.onclick = async function() {
        statusBox.innerText = "...جاري التحقق";
        statusBox.className = "status status-loading";
        
        try {
            const scopes = ['username', 'payments', 'wallet_address'];
            
            // التعامل مع المدفوعات غير المكتملة
            const onIncompletePaymentFound = (payment) => {
                console.log("Incomplete payment found", payment);
            };

            // طلب المصادقة
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

            // تحديث الواجهة عند النجاح
            statusBox.style.display = "none";
            authBtn.style.display = "none";
            userInfo.style.display = "block";
            
            userName.innerText = auth.user.username;
            userAddr.innerText = auth.user.uid;

        } catch (error) {
            statusBox.innerText = "فشل تسجيل الدخول";
            statusBox.className = "status status-error";
            console.error("Auth Error:", error);
        }
    };

    // بدء التشغيل
    initPi();
</script>

</body>
</html>
