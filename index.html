<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات الخرسانية</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; border-top: 5px solid #ffa000; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #5e35b1; }
        .btn { background-color: #ffa000; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #user-section { display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>مكتب الفريد للخدمات</h1>
        <p>تطوير: أحمد الفريد</p>

        <div id="login-area">
            <p>اضغط للربط مع <b>الشبكة</b></p>
            <button class="btn" onclick="login()">دخول بواسطة Pi Browser</button>
        </div>

        <div id="user-section">
            <p>أهلاً بك: <span id="username" style="color: green; font-weight: bold;">...</span></p>
            <p>منطقة الخدمة: 6 أكتوبر / الشيخ زايد</p>
            <button class="btn" style="background-color: #5e35b1;">طلب خرسانة جاهزة</button>
        </div>
    </div>

    <script>
        // تهيئة الـ SDK مع السماح بالـ Sandbox
        Pi.init({ version: "2.0", sandbox: true });

        async function login() {
            console.log("محاولة تسجيل الدخول...");
            try {
                const scopes = ['username', 'payments'];
                
                // دالة معالجة الدفعات المعلقة (إجبارية للـ SDK)
                function onIncompletePaymentFound(payment) {
                    console.log("هناك دفعة معلقة:", payment);
                };

                // محاولة المصادقة
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                // إذا نجح الاتصال
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('user-section').style.display = 'block';
                document.getElementById('username').innerText = auth.user.username;
                
                alert("تم الربط بنجاح يا " + auth.user.username);
                
            } catch (err) {
                // إذا حدث خطأ، سيعطيك رسالة واضحة بالسبب
                alert("عذراً! لم نتمكن من الربط بالشبكة. تأكد من فتح التطبيق داخل Pi Browser فقط.");
                console.error("Error details:", err);
            }
        }
    </script>
</body>
</html>
