<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; text-align: center; padding: 20px; direction: rtl; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; border-top: 10px solid #ffa000; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { color: #5e35b1; margin-bottom: 5px; }
        label { display: block; text-align: right; font-weight: bold; margin-top: 15px; }
        input, select { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; box-sizing: border-box; }
        .btn-order { background-color: #25D366; color: white; border: none; padding: 18px; width: 100%; font-size: 20px; border-radius: 15px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        #status { margin-top: 15px; font-weight: bold; color: #5e35b1; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>مكتب الفريد للخدمات</h1>
    <p style="color: #888;">تطوير: أحمد الفريد</p>
    <hr style="border:0; border-top:1px solid #eee;">

    <label>منطقة التوريد:</label>
    <select id="area">
        <option>6 أكتوبر</option>
        <option>الشيخ زايد</option>
        <option>حدائق أكتوبر</option>
    </select>

    <label>الكمية (متر مكعب):</label>
    <input type="number" id="meters" placeholder="اكتب الكمية هنا" inputmode="decimal">

    <button class="btn-order" onclick="sendToWhatsApp()">تأكيد الطلب عبر واتساب</button>

    <div id="status"></div>
</div>

<script>
    // 1. دمج إعدادات التطبيق ومفتاح الـ API الجديد
    const config = {
        apiKey: "Ejarzo7pkpn4cxireinufet3qkojbziqevkaqxyjqi0p60488webc8qujyabnkeq",
        version: "2.0",
        sandbox: true 
    };

    // تهيئة شبكة Pi
    Pi.init(config);

    async function sendToWhatsApp() {
        const m = document.getElementById('meters').value;
        const a = document.getElementById('area').value;
        const s = document.getElementById('status');

        if (!m || m <= 0) {
            alert("يا برنس أحمد، فضلاً اكتب الكمية أولاً");
            return;
        }

        s.innerText = "جاري الاتصال بالشبكة وتجهيز الواتساب...";

        // 2. دمج الرسالة ورقم الواتساب الخاص بك
        const phoneNumber = "201551016807";
        const message = `طلب خرسانة جديد من تطبيق الفريد\nالكمية: ${m} متر\nالمنطقة: ${a}`;
        const whatsappUrl = "https://api.whatsapp.com/send?phone=" + phoneNumber + "&text=" + encodeURIComponent(message);

        try {
            // محاولة التحقق من اليوزر لضمان الجدية (اختياري وسريع)
            await Pi.authenticate(['username'], function(p){});
            
            // فتح الواتساب مباشرة
            window.location.href = whatsappUrl;

        } catch (e) {
            // إذا حدث أي تأخير في الشبكة، يفتح الواتساب فوراً كخطة بديلة
            window.location.href = whatsappUrl;
        }
    }
</script>

</body>
</html>
