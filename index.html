<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيق أحمد على باي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">
    <h1>تطبيقي الأول في شبكة باي</h1>
    <button id="btn" style="padding: 15px; background: #673ab7; color: white; border: none; border-radius: 10px;">
        تسجيل الدخول باستخدام Pi
    </button>
    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });
        document.getElementById('btn').onclick = function() {
            Pi.authenticate(['username', 'payments'])
              .then(function(auth) {
                alert("مرحباً بك يا " + auth.user.username);
              })
              .catch(function(error) {
                console.error(error);
              });
        };
    </script>
</body>
</html>
