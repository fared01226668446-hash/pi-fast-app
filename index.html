<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات - Al-Fareed Office</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #ffa500; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .service-text { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .status { margin: 20px 0; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .status-error { background-color: #ffebee; color: #c62828; }
        .status-success { background-color: #e8f5e9; color: #2e7d32; }
        .status-wait { background-color: #fff3e0; color: #ef6c00; }
        button { background-color: #673ab7; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        button:hover { background-color: #512da8; }
        .user-info { display: none; margin-top: 20px; text-align: right; background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .badge { background: #ffa500; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>مكتب الفريد 🏢</h1>
        <h2>للخدمات الذكية</h2>
        <p class="service-text">الخرسانة الجاهزة في (6 أكتوبر والشيخ زايد) <span class="badge">Testnet</span></p>
        
        <div id="statusBox" class="status status-wait">جاري تهيئة الاتصال بنظام Pi...</div>

        <button id="authBtn" style="display: none;">الاتصال بمحفظة Pi</button>
        
        <div id="userInfo" class="user-info">
            <p><strong>أهلاً بك يا باشمهندس:</strong> <span id="userName" style="color: #673ab7;"></span></p>
            <p><strong>عنوان المحفظة:</strong> <br> <small id="userAddr" style="word-break: break-all; color: #666;"></small></p>
            <hr>
            <p style="text-align: center; font-weight: bold; color: #2c3e50;">خدماتنا النشطة:</p>
            <button onclick="alert('جاري تجهيز نظام طلب الخرسانة...')">طلب خرسانة جاهزة</button>
            <p style="font-size: 12px; color: #999; text-align: center; margin-top: 10px;">ستحصل على مكافأة 1% عند كل طلب</p>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('statusBox');
        const authBtn = document.getElementById('authBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userAddr = document.getElementById('userAddr');

        // 1. تهيئة الـ SDK
        const Pi = window.Pi;
        try {
            Pi.init({ version: "2.0", sandbox: true });
            statusBox.innerText = "تم الاتصال ببيئة Pi بنجاح. يرجى تسجيل الدخول.";
            statusBox.className = "status status-success";
            authBtn.style.display = "block";
        } catch (e) {
            statusBox.innerText = "خطأ: يرجى فتح التطبيق من داخل Pi Browser حصراً.";
            statusBox.className = "status status-error";
        }

        // 2. وظيفة تسجيل الدخول (Authentication)
        authBtn.onclick = async function() {
            statusBox.innerText = "جاري التحقق من المحفظة...";
            statusBox.className = "status status-wait";

            try {
                const scopes = ['username', 'payments'];
                
                function onIncompletePaymentFound(payment) {
                    console.log("هناك مدفوعات معلقة:", payment);
                };

                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                // نجاح الاتصال
                statusBox.style.display = "none";
                authBtn.style.display = "none";
                userInfo.style.display = "block";
                
                userName.innerText = auth.user.username;
                userAddr.innerText = "GD2JN...FLZTM (محفظة التطبيق المرتبطة)"; // أو يمكنك عرض عنوان المستخدم الفعلي
                
                console.log("تم تسجيل الدخول بنجاح:", auth.user.username);
            } catch (error) {
                statusBox.innerText = "فشل الاتصال. تأكد من الموافقة على الأذونات.";
                statusBox.className = "status status-error";
                console.error(error);
            }
        };
    </script>
</body>
</html>
