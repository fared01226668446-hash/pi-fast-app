<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - بوابة التوريد الرقمية DEX</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/10.4.1/stellar-sdk.js"></script>
    
    <style>
        /* إعدادات الأبعاد والهوية البصرية */
        :root {
            --primary-purple: #6a1b9a;
            --accent-purple: #9c27b0;
            --pi-yellow: #fbc02d;
            --whatsapp-green: #25D366;
            --text-dark: #212121;
            --background: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* تعديلات الأبعاد 750*1500 */
        .app-container {
            width: 750px;
            height: 1500px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* الهيدر المطور */
        .header {
            background: linear-gradient(135deg, var(--primary-purple), var(--accent-purple));
            color: white;
            padding: 60px 40px;
            text-align: center;
            border-bottom: 8px solid var(--pi-yellow);
        }

        .header h2 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 1px;
        }

        .header p {
            margin: 15px 0 0;
            font-size: 1.4rem;
            opacity: 0.9;
        }

        /* محتوى التطبيق */
        .content {
            padding: 60px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 45px;
        }

        label {
            display: block;
            margin-bottom: 18px;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-purple);
        }

        input {
            width: 100%;
            padding: 25px;
            border: 3px solid #eee;
            border-radius: 20px;
            font-size: 1.4rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(156, 39, 176, 0.1);
            outline: none;
        }

        input[readonly] {
            background-color: #fcfcfc;
            color: var(--accent-purple);
            font-weight: bold;
        }

        /* الأزرار الضخمة */
        .btn {
            width: 100%;
            padding: 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.6rem;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 30px;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-pay {
            background: var(--pi-yellow);
            color: var(--primary-purple);
            box-shadow: 0 10px 30px rgba(251, 192, 45, 0.4);
        }

        .btn-whatsapp {
            background: var(--whatsapp-green);
            color: white;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .btn-report {
            background: white;
            color: var(--text-dark);
            border: 3px solid #ddd;
        }

        /* قسم الفاتورة والهاش */
        #invoice-section {
            display: none;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-icon {
            font-size: 6rem;
            margin-bottom: 30px;
        }

        .hash-container {
            margin: 40px 0;
            text-align: right;
        }

        .hash-box {
            background: #fff9e6;
            border: 2px dashed var(--pi-yellow);
            padding: 25px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            word-break: break-all;
            border-radius: 20px;
            color: #555;
            line-height: 1.5;
        }

        /* التذييل القانوني */
        .legal-footer {
            margin-top: auto;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 25px;
            border: 1px solid #eee;
            text-align: center;
        }

        .legal-footer strong {
            font-size: 1.3rem;
            color: var(--primary-purple);
            display: block;
            margin-bottom: 10px;
        }

        .legal-footer p {
            font-size: 1.1rem;
            color: #777;
            line-height: 1.8;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h2>مكتب الفريد</h2>
            <p>Ready-Mix Concrete | بوابة DEX المعتمدة</p>
        </header>

        <main class="content">
            <div id="order-form">
                <div class="form-group">
                    <label>اسم المشروع / موقع التوريد</label>
                    <input type="text" id="projectName" placeholder="مثلاً: مشروع أكتوبر الجديد">
                </div>

                <div class="form-group">
                    <label>الكمية المطلوبة (متر مكعب)</label>
                    <input type="number" id="quantity" oninput="calculateTotal()" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label>تكلفة التوريد التقديرية (Pi)</label>
                    <input type="text" id="totalPrice" readonly value="0.0000 Pi">
                </div>

                <button class="btn btn-pay" onclick="handlePayment()">تأكيد الطلب والدفع الرقمي</button>
            </div>

            <div id="invoice-section">
                <div class="status-icon">✅</div>
                <h3 style="font-size: 2.2rem; color: #2e7d32;">تم التوثيق عبر RPC</h3>
                
                <div class="hash-container">
                    <label style="font-size: 1.2rem; color: #666;">Blockchain TX Hash:</label>
                    <div class="hash-box" id="txHash">جاري جلب بيانات الشبكة...</div>
                </div>

                <a href="https://wa.me/201551551052" target="_blank" class="btn btn-whatsapp">
                    ارسال لوكيشن الموقع (واتساب)
                </a>

                <button class="btn btn-report" onclick="downloadComplianceReport()">تحميل فاتورة الامتثال</button>

                <div class="legal-footer">
                    <strong>Clarity Act 2026 Compliance</strong>
                    <p>
                        API Key: hxusp9srryszcfu3...<br>
                        تمت المعاملة بنظام اللامركزية الكاملة. لا يحق للمطور الوصول للأصول.
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script>
        /* إعدادات محرك DEx و RPC */
        const PI_CONVERSION_RATE = 314159;
        const RPC_NODE = "https://horizon.stellar.org";
        const stellarServer = new StellarSdk.Server(RPC_NODE);

        // تهيئة Pi SDK
        const PiInstance = window.Pi;
        try {
            PiInstance.init({ version: "2.0", sandbox: false });
        } catch(err) {
            console.warn("إشعار: يعمل خارج بيئة Pi Browser");
        }

        function calculateTotal() {
            const qty = document.getElementById('quantity').value;
            // معادلة السعر المرجعية
            const calculated = (qty > 0) ? (qty * 0.0001).toFixed(4) : "0.0000";
            document.getElementById('totalPrice').value = calculated + " Pi";
        }

        async function handlePayment() {
            const name = document.getElementById('projectName').value;
            const amount = document.getElementById('totalPrice').value;

            if(!name || parseFloat(amount) <= 0) {
                alert("يرجى إكمال بيانات المشروع والكمية");
                return;
            }

            try {
                const payResponse = await PiInstance.createPayment({
                    amount: parseFloat(amount),
                    memo: `Concrete Supply: ${name}`,
                    metadata: { type: "ready-mix", loc: "6-October" }
                }, {
                    onReadyForServerApproval: (id) => console.log("Waiting Approval:", id),
                    onReadyForServerCompletion: (id, txid) => finalizeOrder(txid),
                    onCancel: (id) => console.log("Payment Cancelled"),
                    onError: (err) => alert("خطأ في الشبكة")
                });
            } catch (e) {
                // محاكاة للـ Local Test
                finalizeOrder("DEX-TX-" + Math.random().toString(36).toUpperCase().slice(2,16));
            }
        }

        function finalizeOrder(hash) {
            document.getElementById('order-form').style.display = 'none';
            document.getElementById('invoice-section').style.display = 'block';
            document.getElementById('txHash').innerText = hash;
        }

        function downloadComplianceReport() {
            const pName = document.getElementById('projectName').value;
            const pCost = document.getElementById('totalPrice').value;
            const hashId = document.getElementById('txHash').innerText;
            const now = new Date().toLocaleString('ar-EG');

            const reportTemplate = `
==========================================
مكتب الفريد - تقرير توريد معتمد
==========================================
التاريخ: ${now}
الموقع: ${pName}
التكلفة: ${pCost}
المعرف الرقمي: ${hashId}

[قانون الوضوح 2026]
هذه الوثيقة تثبت سداد القيمة عبر بروتوكول RPC
المعتمد لشبكة Pi اللامركزية.
==========================================`;

            const blobData = new Blob([reportTemplate], { type: 'text/plain' });
            const downloadUrl = URL.createObjectURL(blobData);
            const anchor = document.createElement('a');
            anchor.href = downloadUrl;
            anchor.download = `AlFareed_Invoice_${pName}.txt`;
            anchor.click();
        }
    </script>
</body>
</html>
