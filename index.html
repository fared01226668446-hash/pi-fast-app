<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .logo { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 15px; border: 3px solid #5e35b1; }
        button { background: #5e35b1; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.w3schools.com/howto/img_avatar.png" class="logo" alt="الفريد">
        <h1>مكتب الفريد للخدمات</h1>
        <p>توريد خرسانة جاهزة - أكتوبر وزايد</p>
        <button onclick="Pi.authenticate(['username'], (p)=>{}).then(u=>alert('أهلاً '+u.username))">دخول بواسطة Pi Network</button>
    </div>
</body>
</html>
