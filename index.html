<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - نظام التوريد اللامركزي 2026</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-purple: #6a1b9a;
            --accent-purple: #9c27b0;
            --pi-yellow: #fbc02d;
            --whatsapp-green: #25D366;
            --text-dark: #212121;
            --background: #f4f7f6;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--white);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-purple), #1e3a8a);
            color: var(--white);
            padding: 35px 20px;
            text-align: center;
            border-bottom: 6px solid var(--pi-yellow);
            position: relative;
        }

        .header h2 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; opacity: 0.9; }

        .content { padding: 25px; flex: 1; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--text-dark); }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
            text-align: center;
        }

        input:focus { border-color: var(--primary-purple); outline: none; background: #fff; }
        input[readonly] { background: #fffdf5; cursor: not-allowed; border-color: var(--pi-yellow); color: #d4a017; font-weight: bold; }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.97); }
        .btn-pay { background-color: var(--primary-purple); color: white; }
        .btn-whatsapp { background-color: var(--whatsapp-green); color: white; }
        .btn-download { background-color: var(--pi-yellow); color: var(--text-dark); }

        #invoice-section { display: none; text-align: center; }

        .success-badge { font-size: 4rem; margin-bottom: 10px; color: #4CAF50; }

        .hash-box {
            background: #f8f9fa;
            border: 1px dashed #ccc;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
            border-radius: 12px;
            margin: 15px 0;
            color: #555;
        }

        .legal-footer {
            font-size: 0.75rem;
            color: #888;
            background: #f9f9f9;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        #report-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 70vh;
            overflow-y: auto;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h2>مكتب الفريد (AlFareed)</h2>
        <p>بوابة توريد الخرسانة - Protocol 21 Ready</p>
    </header>

    <main class="content">
        <div id="order-form">
            <div class="form-group">
                <label>اسم المشروع / العميل</label>
                <input type="text" id="p_name" placeholder="مثال: موقع الشيخ زايد">
            </div>

            <div class="form-group">
                <label>الكمية المطلوبة (متر مكعب)</label>
                <input type="number" id="p_qty" oninput="calculateTotal()" placeholder="0">
            </div>

            <div class="form-group">
                <label>إجمالي التكلفة بـ Pi (GCV 314.159)</label>
                <input type="text" id="p_price" readonly placeholder="Pi 0.0000000">
            </div>

            <button class="btn btn-pay" onclick="processPiPayment()">
                <i class="fas fa-bolt"></i> تأكيد الطلب والدفع الرقمي
            </button>
        </div>

        <div id="invoice-section" style="animation: fadeIn 0.6s ease;">
            <div class="success-badge"><i class="fas fa-check-circle"></i></div>
            <h3 style="color: #2e7d32;">اكتملت المعاملة بنجاح</h3>
            <p style="font-size: 0.85rem; color: #666;">تم فحص المحفظة وتأكيد التوريد</p>
            
            <div class="hash-box" id="p_hash"></div>
            
            <a id="whatsapp-link" class="btn btn-whatsapp" href="#">
                <i class="fab fa-whatsapp"></i> إرسال التفاصيل (WhatsApp)
            </a>

            <button class="btn btn-download" onclick="generateReport()">
                <i class="fas fa-file-invoice"></i> تحميل شهادة الامتثال
            </button>
        </div>
    </main>

    <footer class="legal-footer">
        <strong>Clarity Act 2026 Compliance</strong><br>
        6 أكتوبر والشيخ زايد - مصر | ليبيا<br>
        Wallet: ...UVT7 | Rate: 314.159
    </footer>
</div>

<div id="report-modal" onclick="this.style.display='none'">
    <div class="modal-content" id="modal-text"></div>
</div>

<script>
    const CONFIG = {
        MY_WALLET: "GAG5UKX7Q3ESDD34MATR...",
        WHATSAPP_NUM: "201551016807",
        GCV_RATE: 314.159
    };

    const Pi = window.Pi;

    // تهيئة البروتوكول الجديد
    try {
        Pi.init({ version: "2.0", sandbox: true });
    } catch (e) { console.error("Pi SDK Init Error"); }

    function calculateTotal() {
        const qty = document.getElementById('p_qty').value || 0;
        // الحسبة بناءً على قيمة الربط GCV
        const total = qty / CONFIG.GCV_RATE; 
        document.getElementById('p_price').value = "Pi " + total.toFixed(7);
    }

    async function processPiPayment() {
        const name = document.getElementById('p_name').value;
        const amount = parseFloat(document.getElementById('p_price').value.replace("Pi ", ""));

        if(!name || amount <= 0) return alert("يرجى إدخال كافة البيانات");

        try {
            const payment = await Pi.createPayment({
                amount: amount,
                memo: `مكتب الفريد: توريد لـ ${name}`,
                metadata: { orderId: "ALF-" + Date.now() }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved ID:", id),
                onReadyForServerCompletion: (id, tx) => finishOrder(tx),
                onCancel: (id) => console.log("Payment Cancelled"),
                onError: (error) => console.error(error)
            });
        } catch (e) {
            // Fallback للوضع التجريبي Protocol 21
            const mockHash = "TX-P21-RC-" + Math.random().toString(36).toUpperCase().substring(5);
            finishOrder(mockHash);
        }
    }

    function finishOrder(hash) {
        document.getElementById('order-form').style.display = 'none';
        document.getElementById('invoice-section').style.display = 'block';
        document.getElementById('p_hash').innerText = hash;

        const name = document.getElementById('p_name').value;
        const qty = document.getElementById('p_qty').value;
        const price = document.getElementById('p_price').value;
        
        const waMsg = `طلب توريد جديد - مكتب الفريد%0Aالعميل: ${name}%0Aالكمية: ${qty} م3%0Aالإجمالي: ${price}%0Aالهاش: ${hash}%0Aالنظام: بروتوكول 21`;
        document.getElementById('whatsapp-link').href = `https://wa.me/${CONFIG.WHATSAPP_NUM}?text=${waMsg}`;
    }

    function generateReport() {
        const n = document.getElementById('p_name').value;
        const v = document.getElementById('p_price').value;
        const h = document.getElementById('p_hash').innerText;
        const d = new Date().toLocaleString('ar-EG');

        const report = `
==========================================
      مكتب الفريد للخدمات (AlFareed Office)
==========================================
شهادة توريد رقمية - إصدار 2026
------------------------------------------
تاريخ العملية: ${d}
العميل/المشروع: ${n}
القيمة المدفوعة: ${v}
سعر الصرف المعتمد: ${CONFIG.GCV_RATE}
رقم المعاملة: ${h}
------------------------------------------
الحالة: تمت المصادقة (Verified)
الشبكة: Pi Network - Protocol 21
==========================================`;

        document.getElementById('modal-text').innerText = report;
        document.getElementById('report-modal').style.display = 'flex';

        try {
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AlFareed_Cert_${Date.now()}.txt`;
            a.click();
        } catch(e) { console.error("Download Failed"); }
    }
</script>

</body>
</html>
