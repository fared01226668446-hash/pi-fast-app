<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات والخرسانة الجاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #e65100; --success: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; text-align: center; color: #333; }
        .header { background: var(--primary); color: white; padding: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); margin-bottom: 25px; border-right: 6px solid var(--primary); }
        .btn-order { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 19px; cursor: pointer; text-decoration: none; display: block; }
        #payout-section { display: none; background: #fff4e5; border: 2px dashed var(--secondary); border-radius: 15px; padding: 20px; animation: slideDown 0.4s ease-out; }
        .status-box { background: #e1bee7; color: #4a148c; padding: 12px; border-radius: 8px; font-weight: bold; margin: 15px 0; font-size: 14px; line-height: 1.5; }
        .btn-execute { background: var(--secondary); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-size: 22px; font-weight: bold; cursor: pointer; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="header" onclick="handleSecretClick()">
    <h1 id="title">مكتب الفريد للخرسانة الجاهزة</h1>
    <p>خدمات أكتوبر والشيخ زايد | 01551016807</p>
</div>

<div class="container">
    <div class="card">
        <h3>طلب توريد خرسانة</h3>
        <p>خلاطات ومضخات حديثة جاهزة للعمل بأفضل الأسعار في المنطقة.</p>
        <a href="https://wa.me/201551016807" class="btn-order">طلب معاينة عبر واتساب</a>
    </div>

    <div id="payout-section">
        <div class="card" style="border-right-color: var(--secondary);">
            <h2 style="color: var(--secondary);">نظام السيولة الشخصي</h2>
            <p>المستحق: 150 دولار</p>
            <div id="status-display" class="status-box">جاري فحص اتصال الـ SDK...</div>
            <button id="exec-btn" class="btn-execute" onclick="startSalaryPayout()">تنفيذ أمر السحب</button>
        </div>
    </div>
</div>

<script>
    const Pi = window.Pi;
    // المحفظة المحدثة التي تنتهي بـ UVTZ
    const WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    let count = 0;

    window.onload = function() {
        const status = document.getElementById('status-display');
        if (typeof Pi !== 'undefined') {
            // ملاحظة: تم تغيير sandbox إلى true ليتوافق مع وضع Testnet في لوحة المطورين
            Pi.init({ version: "2.0", sandbox: true }); 
            status.innerHTML = "تم الربط بنجاح. النظام جاهز للأمر.";
        } else {
            setTimeout(() => {
                if (typeof Pi !== 'undefined') {
                    Pi.init({ version: "2.0", sandbox: true });
                    status.innerHTML = "تم الاتصال بالشبكة بنجاح.";
                } else {
                    status.innerHTML = "يرجى فتح الصفحة من داخل Pi Browser وتحديثها.";
                }
            }, 1500);
        }
    };

    function handleSecretClick() {
        count++;
        if (count >= 5) {
            document.getElementById('payout-section').style.display = 'block';
            count = 0;
            alert("مرحباً أستاذ أحمد، تم الدخول للوحة التحكم.");
        }
    }

    async function startSalaryPayout() {
        const status = document.getElementById('status-display');
        const btn = document.getElementById('exec-btn');
        
        try {
            status.innerHTML = "جاري التحقق من الهوية الشخصية...";
            await Pi.authenticate(['payments', 'username']);
            
            status.innerHTML = "جاري توقيع المعاملة...";
            btn.disabled = true;

            await Pi.createPayment({
                amount: 150,
                memo: "Salary Payout - Ahmed Farid",
                metadata: { type: "weekly_salary" },
                to_address: WALLET
            }, {
                onReadyForServerApproval: (id) => { status.innerHTML = "بانتظار موافقة الشبكة.. رقم المعاملة: " + id; },
                onReadyForServerCompletion: (id, txid) => {
                    status.innerHTML = "تم السحب بنجاح! مبروك يا أستاذ أحمد.";
                    btn.innerHTML = "تم التنفيذ ✅";
                    window.open(`https://wa.me/201551016807?text=${encodeURIComponent('تم استلام الراتب بنجاح رقم العملية: ' + txid)}`, '_blank');
                },
                onCancel: (id) => { status.innerHTML = "تم إلغاء السحب."; btn.disabled = false; },
                onError: (err) => { status.innerHTML = "خطأ: تأكد من إعدادات المايننت."; btn.disabled = false; }
            });
        } catch (e) {
            status.innerHTML = "تنبيه: فشل التحقق. تأكد من فتح التطبيق داخل Pi Browser.";
        }
    }
</script>

</body>
</html>
