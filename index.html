<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتب الفريد للخرسانة الجاهزة</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        :root {
            --main-bg: #673ab7;
            --accent: #ffa500;
        }
        body {
            background-color: var(--main-bg);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .app-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status-badge {
            background: #fff;
            color: #333;
            padding: 10px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-order {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .footer-text { margin-top: 20px; font-size: 10px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>الفريد للخرسانة الجاهزة</h2>
    <p>تغطية كاملة: أكتوبر - زايد - حدائق أكتوبر</p>

    <div id="status" class="status-badge">في انتظار تسجيل دخول Pi...</div>

    <button class="btn-order" onclick="login()">دخول وطلب خرسانة</button>

    <div class="footer-text">
        App ID المتصل: <br>
        <span style="font-family: monospace; color: #ffeb3b;">rgd3i5ncoo7wskuzewwv41t7bj0mccpqwniiq7mhifmzewjv9tdu8c9cbtz8nrne</span>
    </div>
</div>

<script>
    // تهيئة Pi SDK باستخدام App ID الخاص بك
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function login() {
        try {
            document.getElementById('status').innerText = "جاري الاتصال بحسابك...";
            
            // استخدام الـ App ID لعمل المصادقة
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            document.getElementById('status').innerText = "أهلاً بك: " + auth.user.username;
            document.getElementById('status').style.backgroundColor = "#4caf50";
            document.getElementById('status').style.color = "white";
            
            console.log("تم الربط بنجاح للتطبيق: rgd3i5ncoo...");
        } catch (err) {
            document.getElementById('status').innerText = "افتح التطبيق من داخل Pi Browser";
            document.getElementById('status').style.backgroundColor = "#f44336";
            document.getElementById('status').style.color = "white";
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Incomplete payment:", payment);
    }

    // حل مشكلة 404 والشرطة المائلة
    (function() {
        if (window.location.pathname.includes('404.html')) {
            window.history.replaceState(null, null, '/pi-fast-app/');
        }
    })();
</script>

</body>
</html>
