<script>
    const statusBox = document.getElementById('statusBox');
    const authBtn = document.getElementById('authBtn');
    const userInfo = document.getElementById('userInfo');
    const userName = document.getElementById('userName');
    const userAddr = document.getElementById('userAddr');

    const Pi = window.Pi;

    // 1. تهيئة الـ SDK
    try {
        Pi.init({ version: "2.0", sandbox: true });
        statusBox.innerText = "متصل ببيئة الاختبار بنجاح";
        statusBox.className = "status status-success";
        authBtn.style.display = "block";
    } catch (e) {
        statusBox.innerText = "خطأ في الاتصال بالشبكة";
        statusBox.className = "status status-error";
    }

    // 2. وظيفة تسجيل الدخول
    authBtn.onclick = async function() {
        statusBox.innerText = "جاري التحقق من المحفظة...";
        statusBox.className = "status status-wait";

        try {
            const scopes = ['username', 'payments', 'wallet_address'];

            // دالة التعامل مع المدفوعات المعلقة (ضرورية)
            function onIncompletePaymentFound(payment) {
                console.log("هناك مدفوعة معلقة:", payment);
            };

            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

            // نجاح الاتصال
            statusBox.style.display = "none";
            authBtn.style.display = "none";
            userInfo.style.display = "block";

            userName.innerText = auth.user.username;
            userAddr.innerText = auth.user.uid.substring(0, 10) + "..."; 

            console.log("تم تسجيل الدخول بنجاح", auth);
        } catch (error) {
            statusBox.innerText = "يرجى الموافقة على الأذونات في محفظتك";
            statusBox.className = "status status-error";
            console.error(error);
        }
    };
</script>
