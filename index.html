<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة الجاهزة | Al-Fareed Concrete</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #5e35b1; margin-bottom: 10px; }
        p { color: #666; }
        .btn-pi { background-color: #5e35b1; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; }
        .btn-pi:hover { background-color: #4527a0; }
        .order-form { display: none; margin-top: 30px; text-align: right; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .price-tag { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>مكتب الفريد للخدمات</h1>
        <p>تطبيقات توريد الخرسانة - 6 أكتوبر والشيخ زايد</p>
        <img src="https://via.placeholder.com/100" alt="Logo" style="border-radius: 50%; margin: 20px 0;">
        <button id="auth-btn" onclick="loginToFaredApp()" class="btn-pi">دخول بواسطة Pi Network</button>
    </div>

    <div id="order-section" class="order-form">
        <h3>طلب صبة خرسانية جديدة</h3>
        <label>المنطقة:</label>
        <select id="area">
            <option value="october">6 أكتوبر / حدائق أكتوبر</option>
            <option value="zayed">الشيخ زايد</option>
        </select>

        <label>نوع الخرسانة:</label>
        <select id="type">
            <option value="250">إجهاد 250 (عادية)</option>
            <option value="350">إجهاد 350 (مسلحة)</option>
            <option value="400">إجهاد 400 (كبارى)</option>
        </select>

        <label>الكمية (متر مكعب):</label>
        <input type="number" id="quantity" placeholder="مثلاً: 50" oninput="calculatePrice()">

        <div class="price-tag" id="total-price">إجمالي السعر: 0 Pi</div>
        
        <button class="btn-pi" onclick="requestConcrete()">تأكيد الطلب والدفع</button>
    </div>
</div>

<script>
    // 1. تعريف التطبيق بالـ API Key بتاعك
    const PI_APP_ID = "Rpw64depyijqsodpwojsg4fdlpsr30kwr7dgofebvb6bosepvw77nvsp9t4lqjyt";
    
    // 2. تشغيل الـ SDK
    Pi.init({ version: "2.0", sandbox: true });

    async function loginToFaredApp() {
        try {
            const user = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
            alert("أهلاً يا برنس " + user.username);
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('order-section').style.display = 'block';
        } catch (err) {
            console.error(err);
            alert("يا برنس افتح من الـ Pi Browser عشان السيستم يشتغل!");
        }
    }

    function calculatePrice() {
        const qty = document.getElementById('quantity').value;
        const typePrice = document.getElementById('type').value;
        // حاسبة افتراضية: كل 10 متر بـ 1 Pi (تقريبي للتجربة)
        const total = (qty * (typePrice / 1000)).toFixed(4);
        document.getElementById('total-price').innerText = "إجمالي السعر التقديري: " + total + " Pi";
    }

    function requestConcrete() {
        alert("جاري تجهيز الطلب وربطك بمحطة الخرسانة في أكتوبر...");
        // هنا يتم استدعاء وظيفة الدفع Pi.createPayment()
    }

    function onIncompletePaymentFound(payment) {
        console.log("هناك دفعة معلقة لمحفظة GDSKA...");
    }
</script>

</body>
</html>
