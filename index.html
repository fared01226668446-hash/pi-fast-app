<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخرسانة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #673ab7; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; color: #333; padding: 40px; border-radius: 20px; width: 80%; max-width: 400px; }
        .btn { background: #ffa500; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>مكتب الفريد للخدمات</h2>
    <p>توريد خرسانة جاهزة - أكتوبر وزايد</p>
    <button class="btn" id="startBtn" onclick="runApp()">دخول التطبيق الآن</button>
    <p id="msg" style="font-size: 12px; color: #666; margin-top: 10px;"></p>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function runApp() {
        const btn = document.getElementById('startBtn');
        const msg = document.getElementById('msg');
        
        btn.disabled = true;
        btn.innerText = "جاري التشغيل...";
        msg.innerText = "يتم الاتصال بشبكة Pi...";

        // مؤقت إجباري: إذا لم يستجب Pi خلال 4 ثوانٍ، افتح الصفحة التالية فوراً
        const forceStart = setTimeout(() => {
            window.location.href = "order.html";
        }, 4000);

        try {
            const scopes = ['username'];
            await Pi.authenticate(scopes, (p) => {});
            clearTimeout(forceStart); // إلغاء المؤقت إذا نجح الاتصال بسرعة
            window.location.href = "order.html";
        } catch (err) {
            // في حال وجود أي خطأ، افتح التطبيق كزائر
            window.location.href = "order.html";
        }
    }
</script>

</body>
</html>
