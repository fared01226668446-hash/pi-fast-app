<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة الجاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-purple: #673ab7;
            --dark-overlay: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* الخلفية مستوحاة من صورتك الميدانية */
        .background-container {
            background-image: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                              url('1000023962.jpg'); /* اسم ملف صورتك مع المعدات */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 85%;
            max-width: 400px;
            animation: fadeIn 1s ease-in;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border: 4px solid var(--pi-purple);
            border-radius: 50%;
            overflow: hidden;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            color: #333;
            margin: 10px 0;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .pi-button {
            background-color: var(--pi-purple);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .pi-button:active {
            transform: scale(0.98);
            background-color: #512da8;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="background-container">
    <div class="login-card">
        <div class="avatar-container">
            <img src="1000023961.jpg" alt="Logo"> 
        </div>
        
        <h1>مكتب الفريد للخدمات</h1>
        <p>توريد خرسانة جاهزة - أكتوبر وزايد</p>

        <button class="pi-button" id="login-btn" onclick="loginWithPi()">
            <div class="loading-spinner" id="spinner"></div>
            <span>دخول بواسطة Pi Network</span>
        </button>
        
        <div id="user-info" style="margin-top: 20px; display: none; color: green;">
            تم تسجيل الدخول بنجاح!
        </div>
    </div>
</div>

<script>
    // تهيئة Pi SDK
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true }); // اجعل sandbox: false عند النشر الفعلي

    async function loginWithPi() {
        const btn = document.getElementById('login-btn');
        const spinner = document.getElementById('spinner');
        
        // إظهار علامة التحميل
        btn.disabled = true;
        spinner.style.display = 'inline-block';

        try {
            // طلب المصادقة من المستخدم
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            console.log("تم تسجيل الدخول للمستخدم:", auth.user.username);
            
            // تحديث الواجهة بعد النجاح
            document.getElementById('user-info').innerText = "مرحباً، " + auth.user.username;
            document.getElementById('user-info').style.display = 'block';
            
            // هنا يمكنك توجيه المستخدم لصفحة الطلبات
            // window.location.href = "orders.html";

        } catch (err) {
            console.error("خطأ في تسجيل الدخول:", err);
            alert("حدث خطأ أثناء الاتصال بـ Pi Network. تأكد من فتح التطبيق عبر Pi Browser.");
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    }

    // وظيفة للتعامل مع المدفوعات غير المكتملة
    function onIncompletePaymentFound(payment) {
        console.log("هناك دفعة معلقة:", payment);
    };
</script>

</body>
</html>
