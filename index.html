<script>
    const Pi = window.Pi;
    // تهيئة التطبيق مع تفعيل وضع الاختبار (Sandbox)
    Pi.init({ version: "2.0", sandbox: true });

    async function login() {
        const status = document.getElementById("status");
        status.innerHTML = "جاري الاتصال بـ Pi Network...";
        
        try {
            // تحديد البيانات المطلوبة (الاسم)
            const scopes = ['username'];
            
            // وظيفة إلزامية للتعامل مع المدفوعات غير المكتملة
            const onIncompletePaymentFound = (payment) => {
                console.log("Incomplete payment found", payment);
            };

            // السطر الأهم: طلب التوثيق الحقيقي
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            // إذا نجح التوثيق
            status.innerHTML = "✅ تم التحقق: " + auth.user.username;
            status.style.color = "#4CAF50";
            console.log("Success!", auth);
            
        } catch (err) {
            // في حالة الرفض أو الخطأ
            status.innerHTML = "❌ فشل التحقق: " + err.message;
            status.style.color = "#f44336";
            console.error("Auth Error:", err);
        }
    }
</script>
