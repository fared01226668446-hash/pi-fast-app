<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; direction: rtl; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 25px; border-top: 12px solid #ffa000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #5e35b1; font-size: 24px; margin-bottom: 10px; }
        .dev-name { color: #777; font-size: 14px; margin-bottom: 20px; }
        label { display: block; text-align: right; font-weight: bold; margin-top: 20px; color: #333; }
        input, select { width: 100%; padding: 15px; margin-top: 10px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #5e35b1; }
        .btn-order { background-color: #25D366; color: white; border: none; padding: 20px; width: 100%; font-size: 22px; border-radius: 15px; cursor: pointer; margin-top: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
        #status { margin-top: 20px; font-weight: bold; color: #5e35b1; font-size: 15px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>مكتب الفريد للخدمات</h1>
    <div class="dev-name">تطوير: أحمد الفريد</div>
    <hr style="border:0; border-top:1px solid #eee;">

    <label>منطقة التوريد:</label>
    <select id="area">
        <option>6 أكتوبر</option>
        <option>الشيخ زايد</option>
        <option>حدائق أكتوبر</option>
    </select>

    <label>الكمية (متر مكعب):</label>
    <input type="number" id="meters" placeholder="ادخل الكمية هنا" inputmode="decimal">

    <button class="btn-order" onclick="startOrder()">تأكيد الطلب عبر واتساب</button>

    <div id="status"></div>
</div>

<script>
    // إعدادات الربط المدمجة (الاستضافة + المفتاح)
    const config = {
        apiKey: "Ejarzo7pkpn4cxireinufet3qkojbziqevkaqxyjqi0p60488webc8qujyabnkeq",
        version: "2.0",
        sandbox: true 
    };

    // تهيئة التطبيق
    Pi.init(config);

    async function startOrder() {
        const m = document.getElementById('meters').value;
        const a = document.getElementById('area').value;
        const s = document.getElementById('status');

        if (!m || m <= 0) {
            alert("يا برنس أحمد، يرجى كتابة الكمية المطلوبة أولاً");
            return;
        }

        s.innerText = "جاري التحقق عبر شبكة Pi...";

        // تجهيز بيانات الواتساب
        const myNumber = "201551016807";
        const textMsg = `طلب خرسانة من تطبيق الفريد\nالكمية: ${m} متر\nالمنطقة: ${a}`;
        const finalUrl = "https://api.whatsapp.com/send?phone=" + myNumber + "&text=" + encodeURIComponent(textMsg);

        try {
            // محاولة التحقق الرسمي من هوية المستخدم (Authentication)
            const auth = await Pi.authenticate(['username'], function(p){
                console.log("User verified: " + p.user.username);
            });

            s.innerText = "تم التحقق! جاري فتح الواتساب...";
            window.location.href = finalUrl;

        } catch (error) {
            // في حالة أي مشكلة في الشبكة، يتم التحويل للواتساب مباشرة لضمان عدم ضياع الطلب
            console.log("التحويل المباشر للواتساب...");
            window.location.href = finalUrl;
        }
    }
</script>

</body>
</html>
