<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; text-align: center; padding: 20px; direction: rtl; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; border-top: 10px solid #ffa000; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { color: #5e35b1; margin-bottom: 5px; }
        label { display: block; text-align: right; font-weight: bold; margin-top: 15px; }
        input, select { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; box-sizing: border-box; }
        .btn-order { background-color: #25D366; color: white; border: none; padding: 18px; width: 100%; font-size: 20px; border-radius: 15px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        #status { margin-top: 15px; font-weight: bold; color: #5e35b1; min-height: 25px; }
        .manual-btn { display: none; background: #5e35b1; color: white; padding: 10px; border-radius: 10px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>مكتب الفريد للخدمات</h1>
    <p style="color: #888;">تطوير: أحمد الفريد</p>
    <hr style="border:0; border-top:1px solid #eee;">

    <label>منطقة التوريد:</label>
    <select id="area">
        <option>6 أكتوبر</option>
        <option>الشيخ زايد</option>
        <option>حدائق أكتوبر</option>
    </select>

    <label>الكمية (متر مكعب):</label>
    <input type="number" id="meters" placeholder="اكتب الكمية هنا" inputmode="decimal">

    <button class="btn-order" id="main-btn" onclick="handleWhatsAppOrder()">تأكيد الطلب عبر واتساب</button>

    <div id="status"></div>
    <a id="manual-link" class="manual-btn" target="_blank">اضغط هنا إذا لم يفتح الواتساب تلقائياً</a>
</div>

<script>
    // تهيئة الشبكة مع وضع Sandbox لتسهيل التجربة
    Pi.init({ version: "2.0", sandbox: true });

    async function handleWhatsAppOrder() {
        const m = document.getElementById('meters').value;
        const a = document.getElementById('area').value;
        const s = document.getElementById('status');
        const manual = document.getElementById('manual-link');

        if (!m || m <= 0) {
            alert("يا برنس، اكتب عدد الأمتار المطلوب أولاً");
            return;
        }

        s.innerText = "جاري التحقق من الهوية...";
        s.style.color = "#5e35b1";

        // تجهيز الرسالة والرابط مسبقاً
        const text = `طلب خرسانة من تطبيق الفريد\nالكمية: ${m} متر\nالمنطقة: ${a}`;
        const whatsappUrl = "https://api.whatsapp.com/send?phone=201551016807&text=" + encodeURIComponent(text);

        try {
            // محاولة الربط (هذه الخطوة قد تأخذ وقتاً في المتصفح)
            const auth = await Pi.authenticate(['username'], function(p){});
            
            s.style.color = "green";
            s.innerText = "تم التحقق بنجاح! جاري التحويل...";
            
            // فتح الواتساب
            window.location.href = whatsappUrl;

        } catch (e) {
            console.error(e);
            s.style.color = "orange";
            s.innerText = "تأخر التحقق.. يمكنك المتابعة يدوياً:";
            // إظهار زر الفتح اليدوي في حال تأخر أو فشل الربط التلقائي
            manual.href = whatsappUrl;
            manual.style.display = "inline-block";
        }
    }
</script>

</body>
</html>
