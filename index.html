<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trading Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 400px; }
        button { background-color: #673ab7; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 15px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 My Trading Test</h2>
        <p>مرحباً بك في تطبيق التداول التجريبي</p>
        <button id="login-btn">تسجيل دخول باستخدام Pi</button>
        <div id="status">في انتظار الاتصال...</div>
    </div>

    <script>
        // 1. تعريف الـ SDK
        const Pi = window.Pi;
        
        // 2. تشغيل الـ SDK (تأكد من وجود sandbox: true للتجربة)
        try {
            Pi.init({ version: "2.0", sandbox: true });
            document.getElementById('status').innerText = "متصل بشبكة Pi ✅";
        } catch (err) {
            document.getElementById('status').innerText = "خطأ في الاتصال بالمكتبة";
        }

        // 3. وظيفة تسجيل الدخول
        document.getElementById('login-btn').addEventListener('click', async () => {
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) { /* للتعامل مع المدفوعات المعلقة */ }

                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('status').innerText = "أهلاً بك: " + auth.user.username;
                alert("تم تسجيل الدخول بنجاح يا برنس!");
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "فشل تسجيل الدخول: " + error.message;
            }
        });
    </script>
</body>
</html>
