<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقي الأول في شبكة باي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        #login-btn { 
            background-color: #673ab7; color: white; border: none; 
            padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; 
        }
        #user-info { margin-top: 20px; font-size: 20px; color: #333; }
    </style>
</head>
<body>

    <h1>تطبيقي الأول في شبكة باي</h1>
    
    <button id="login-btn">تسجيل الدخول باستخدام باي</button>
    
    <div id="user-info"></div>

    <script>
        // تهيئة Pi SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true }); // استخدم sandbox: true للتجربة

        const loginBtn = document.getElementById('login-btn');
        const userInfo = document.getElementById('user-info');

        loginBtn.onclick = function() {
            // طلب تسجيل الدخول
            const scopes = ['username', 'payments'];
            
            function onIncompletePaymentFound(payment) {
                console.log("هناك مدفوعات لم تكتمل");
            };

            Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
                userInfo.innerHTML = "أهلاً بك يا " + auth.user.username + "! تم تسجيل الدخول بنجاح.";
                loginBtn.style.display = 'none';
                console.log("تم تسجيل الدخول للمستخدم:", auth.user.username);
            }).catch(function(error) {
                console.error("خطأ في تسجيل الدخول:", error);
                alert("حدث خطأ أثناء تسجيل الدخول، تأكد من فتح الرابط داخل Pi Browser.");
            });
        };
    </script>
</body>
</html>
