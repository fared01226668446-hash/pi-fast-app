<script>
    const Pi = window.Pi;
    // التأكد من تهيئة الـ SDK مع وضع الاختبار
    Pi.init({ version: "2.0", sandbox: true });

    async function login() {
        const status = document.getElementById("status");
        status.innerHTML = "جاري الاتصال بالشبكة...";
        
        try {
            // طلب التوثيق الأساسي للحصول على اسم المستخدم
            const scopes = ['username'];
            
            // هذه الوظيفة ضرورية جداً في الـ SDK الجديد لضمان استقرار الربط
            const onIncompletePaymentFound = (payment) => {
                console.log("Incomplete payment found", payment);
            };

            // تنفيذ عملية التوثيق البرمي
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            // عرض النتيجة عند النجاح
            status.innerHTML = "✅ أهلاً بك: " + auth.user.username;
            status.style.color = "#2e7d32";
            
        } catch (error) {
            // معالجة أخطاء الربط البرمي
            status.innerHTML = "❌ فشل في الربط البرمي (SDK)";
            status.style.color = "#d32f2f";
            console.error("SDK Error:", error);
        }
    }
</script>
