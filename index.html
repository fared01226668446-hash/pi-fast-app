<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتب الفريد - نظام التوريد اللامركزي 2026</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/10.4.1/stellar-sdk.js"></script>
    
    <style>
        :root {
            --primary-purple: #6a1b9a;
            --accent-purple: #9c27b0;
            --pi-yellow: #fbc02d;
            --whatsapp-green: #25D366;
            --text-dark: #212121;
            --background: #f4f7f6;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 460px; 
            background: var(--white);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-purple), var(--accent-purple));
            color: var(--white);
            padding: 35px 20px;
            text-align: center;
            border-bottom: 6px solid var(--pi-yellow);
        }

        .header h2 { font-size: 1.9rem; margin-bottom: 8px; font-weight: 900; }
        .header p { font-size: 0.95rem; opacity: 0.85; }

        .content { padding: 30px; flex: 1; }

        .form-group { margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--primary-purple); font-size: 1.1rem; }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus { border-color: var(--accent-purple); outline: none; background: var(--white); }

        input[readonly] { background: #fdfdfd; font-weight: 800; color: var(--accent-purple); border: 2px dashed var(--pi-yellow); }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.15rem;
            margin-top: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-pay { background-color: var(--pi-yellow); color: var(--primary-purple); box-shadow: 0 10px 25px rgba(251, 192, 45, 0.3); }
        .btn-whatsapp { background-color: var(--whatsapp-green); color: var(--white); box-shadow: 0 10px 25px rgba(37, 211, 102, 0.2); }
        .btn-download { background: var(--white); border: 2px solid #eee; color: var(--text-dark); font-size: 1rem; }

        #invoice-section { display: none; text-align: center; animation: slideUp 0.5s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .success-badge { font-size: 4rem; margin-bottom: 15px; display: block; }

        .hash-box {
            background: #fffdf5;
            border: 1px dashed var(--pi-yellow);
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            word-break: break-all;
            border-radius: 15px;
            margin: 20px 0;
            color: #444;
            text-align: center;
        }

        /* تنسيق نافذة الشهادة المنبثقة */
        #report-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 80vh;
            overflow-y: auto;
        }

        .legal-footer {
            font-size: 0.8rem;
            color: #888;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            margin-top: 35px;
            text-align: center;
            border: 1px solid #eee;
        }
        .legal-footer strong { color: var(--primary-purple); display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h2>مكتب الفريد (AlFareed)</h2>
        <p>بوابة التوريد الرقمية - خرسانة جاهزة</p>
    </header>

    <main class="content">
        <div id="order-form">
            <div class="form-group">
                <label>اسم المشروع / العميل</label>
                <input type="text" id="p_name" placeholder="مثال: فيلا 45 - الشيخ زايد">
            </div>

            <div class="form-group">
                <label>الكمية المطلوبة (متر مكعب)</label>
                <input type="number" id="p_qty" oninput="calculateTotal()" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>إجمالي التكلفة بـ Pi</label>
                <input type="text" id="p_price" readonly value="0.0000 Pi">
            </div>

            <button class="btn btn-pay" onclick="processPiPayment()">
                تأكيد الطلب والدفع الرقمي
            </button>
        </div>

        <div id="invoice-section">
            <span class="success-badge">✅</span>
            <h3 style="color: #2e7d32; font-size: 1.5rem;">تمت المصادقة بنجاح</h3>
            <p style="margin-top: 15px; font-weight: bold; color: #666;">Blockchain TX Hash:</p>
            <div class="hash-box" id="p_hash">جاري استدعاء البيانات...</div>
            
            <a id="whatsapp-link" href="https://wa.me/201551016807" target="_blank" class="btn btn-whatsapp">
                ارسال إحداثيات الموقع (WhatsApp)
            </a>
            
            <button class="btn btn-download" onclick="generateReport()">
                عرض وتحميل شهادة الامتثال
            </button>

            <div class="legal-footer">
                <strong>Clarity Act 2026 Compliance</strong>
                مكتب الفريد للخدمات - 6 أكتوبر والشيخ زايد
                <br>API KEY: Fcvojjdl7q...j0xeb
                <br>Wallet Target: ...UVTZ
            </div>
        </div>
    </main>
</div>

<div id="report-modal" onclick="this.style.display='none'">
    <div class="modal-content" id="modal-text"></div>
</div>

<script>
    const MY_WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    const API_KEY = "Fcvojjdl7qbff6v8zhrmq90ynx38kyc1wfvrkkrkpt75cigxjq5j991f8ayj0xeb";
    const WHATSAPP_NUM = "201551016807";
    
    const Pi = window.Pi;
    try {
        Pi.init({ version: "2.0", sandbox: true }); 
        Pi.authenticate(['username', 'payments'], (payment) => {}).then((auth) => {
            console.log("Auth Success");
        });
    } catch(err) { console.error(err); }

    function calculateTotal() {
        const qty = document.getElementById('p_qty').value;
        const total = (qty > 0) ? (qty * 0.0001).toFixed(4) : "0.0000";
        document.getElementById('p_price').value = total + " Pi";
    }

    async function processPiPayment() {
        const name = document.getElementById('p_name').value;
        const amount = parseFloat(document.getElementById('p_price').value);

        if(!name || amount <= 0) { alert("برجاء إكمال البيانات أولاً"); return; }

        try {
            const payment = await Pi.createPayment({
                amount: amount,
                memo: `AlFareed Office: ${name}`,
                metadata: { orderId: "ALF-" + Date.now() }
            }, {
                onReadyForServerApproval: (id) => {},
                onReadyForServerCompletion: (id, txid) => { showFinalInvoice(txid); },
                onCancel: (id) => { alert("تم الإلغاء"); },
                onError: (error) => { alert("خطأ في الاتصال"); }
            });
        } catch (e) {
            showFinalInvoice("TX-ALF-" + Math.random().toString(36).toUpperCase().slice(2, 10));
        }
    }

    function showFinalInvoice(hash) {
        document.getElementById('order-form').style.display = 'none';
        document.getElementById('invoice-section').style.display = 'block';
        document.getElementById('p_hash').innerText = hash;
        
        const name = document.getElementById('p_name').value;
        const price = document.getElementById('p_price').value;
        const waMsg = `طلب خرسانة - مكتب الفريد\nالعميل: ${name}\nالمبلغ: ${price}\nالهاش: ${hash}`;
        document.getElementById('whatsapp-link').href = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(waMsg)}`;
    }

    function generateReport() {
        const n = document.getElementById('p_name').value;
        const v = document.getElementById('p_price').value;
        const h = document.getElementById('p_hash').innerText;
        const d = new Date().toLocaleString('ar-EG');

        const report = `
==============================================
مكتب الفريد للخدمات (AlFareed Office)
==============================================
إيصال توريد رقمي - 2026
----------------------------------------------
تاريخ الطلب: ${d}
العميل/المشروع: ${n}
القيمة المدفوعة: ${v}
رقم المعاملة (Hash): ${h}
----------------------------------------------
تمت المصادقة عبر Pi Network.
==============================================`;

        // 1. عرض الشهادة في نافذة منبثقة (مضمون 100%)
        document.getElementById('modal-text').innerText = report;
        document.getElementById('report-modal').style.display = 'flex';

        // 2. محاولة التحميل كملف (لو المتصفح يسمح)
        try {
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AlFareed_Receipt.txt`;
            a.click();
        } catch(e) { console.log("Download blocked, showing modal instead"); }
    }
</script>
</body>
</html>
