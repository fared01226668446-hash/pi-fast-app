<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - Final Fix</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #6a1b9a; }
        .section-title { font-size: 14px; font-weight: bold; color: #6a1b9a; margin: 15px 0 5px; background: #f3e5f5; padding: 8px; border-radius: 8px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 15px; background: #6a1b9a; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: #4a148c; transform: scale(0.98); }
        .btn-liq { background: #007bff; }
        #res { display: none; margin-top: 15px; background: #e8f5e9; padding: 15px; border-radius: 12px; color: #2e7d32; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#6a1b9a;">مكتب الفريد الذكي</h2>
    
    <div id="main-ui">
        <div class="section-title">طلب توريد خرسانة (Services)</div>
        <input type="number" id="qty" placeholder="الكمية (متر مكعب)" oninput="calculate()">
        <input type="text" id="amt" readonly placeholder="السعر بـ Pi">
        <button class="btn" ontouchstart="" onclick="payNow('Service')">تأكيد دفع الخدمة</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">

        <div class="section-title">دعم حوض السيولة (Liquidity)</div>
        <input type="number" id="liq_qty" placeholder="كمية السيولة المراد نقلها">
        <button class="btn btn-liq" ontouchstart="" onclick="payNow('Liquidity')">نقل إلى حوض السيولة</button>
    </div>

    <div id="res">
        <p style="font-weight: bold;">✅ تمت العملية بنجاح!</p>
        <p id="tx-info" style="font-size: 10px; color: #444; word-break: break-all;"></p>
        <button id="wa-btn" class="btn" style="background: #25D366;">إرسال الهاش عبر واتساب</button>
    </div>
</div>

<script>
    const MY_WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    const MY_PHONE = "201551016807";
    
    // إجبار المتصفح على التعرف على الأزرار
    window.onload = function() {
        if (window.Pi) {
            window.Pi.init({ version: "2.0", sandbox: false });
            console.log("Pi SDK Initialized");
        }
    };

    function calculate() {
        let q = document.getElementById('qty').value;
        if(q > 0) {
            let result = (parseFloat(q) / 314.159).toFixed(7);
            document.getElementById('amt').value = result + " Pi";
        }
    }

    async function payNow(type) {
        // منع أي تعليق في الزر
        console.log("Payment Started: " + type);
        
        let amount, memo, category;
        if(type === 'Service') {
            let val = document.getElementById('amt').value.replace(" Pi", "");
            amount = parseFloat(val);
            memo = "توريد خرسانة - مكتب الفريد";
            category = "Service Request";
        } else {
            amount = parseFloat(document.getElementById('liq_qty').value);
            memo = "دعم حوض السيولة للشبكة";
            category = "Liquidity Pool";
        }

        if(!amount || amount <= 0) {
            alert("يرجى إدخال كمية صحيحة");
            return;
        }

        try {
            const payment = await window.Pi.createPayment({
                amount: amount,
                memo: memo,
                metadata: { protocol: "RPC2", type: category, wallet: MY_WALLET }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved"),
                onReadyForServerCompletion: (id, tx) => showSuccess(tx, amount, category),
                onCancel: () => console.log("Cancelled"),
                onError: (e) => alert("خطأ: " + e.message)
            });
        } catch (e) {
            alert("تنبيه: يرجى فتح التطبيق من داخل Pi Browser فقط لعمل الأزرار.");
        }
    }

    function showSuccess(tx, a, cat) {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('res').style.display = 'block';
        document.getElementById('tx-info').innerText = "الهاش: " + tx;
        
        let message = `مرحبا مكتب الفريد،\nتم تنفيذ عملية ${cat}\nالمبلغ: ${a} Pi\nالهاش: ${tx}`;
        document.getElementById('wa-btn').onclick = () => {
            window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(message)}`);
        };
    }
</script>

</body>
</html>
