<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trading Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0ebf8; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #673ab7; font-size: 24px; }
        .btn-main { background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:disabled { background-color: #ccc; cursor: not-allowed; }
        .trading-panel { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .stat-box { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .btn-buy { background-color: #4caf50; color: white; border: none; padding: 10px; border-radius: 5px; width: 45%; cursor: pointer; }
        .btn-sell { background-color: #f44336; color: white; border: none; padding: 10px; border-radius: 5px; width: 45%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Trading Test 🚀</h1>
    <p id="status-text">جاري تحضير الاتصال بشبكة باي...</p>
    
    <button id="login-btn" class="btn-main" disabled onclick="loginWithPi()">انتظر ثواني...</button>

    <div id="trading-panel" class="trading-panel">
        <div class="stat-box">الرصيد: <span id="balance">100 IRRA</span></div>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-buy" onclick="createTrade('شراء')">شراء (0.1 Pi)</button>
            <button class="btn-sell" onclick="createTrade('بيع')">بيع العملة</button>
        </div>
    </div>
</div>

<script>
    const Pi = window.Pi;
    const loginBtn = document.getElementById('login-btn');
    const statusText = document.getElementById('status-text');

    // 1. تهيئة الـ SDK أولاً وبشكل إلزامي
    Pi.init({ version: "1.5" }).then(() => {
        console.log("Pi SDK Initialized");
        loginBtn.disabled = false; // تفعيل الزر بعد الجاهزية
        loginBtn.innerText = "تسجيل الدخول باستخدام باي";
        statusText.innerText = "الشبكة جاهزة الآن";
    }).catch((err) => {
        statusText.innerText = "خطأ في الاتصال بالشبكة";
        console.error(err);
    });

    // 2. دالة تسجيل الدخول
    async function loginWithPi() {
        try {
            const scopes = ['username', 'payments'];
            const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            loginBtn.style.display = 'none';
            document.getElementById('trading-panel').style.display = 'block';
            statusText.innerHTML = "أهلاً بك يا <b>" + user.user.username + "</b>";
        } catch (err) {
            alert("حدث خطأ أثناء الدخول: " + err.message);
        }
    }

    // 3. التعامل مع المدفوعات المعلقة
    function onIncompletePaymentFound(payment) {
        console.log("Payment pending:", payment);
    };

    // 4. تنفيذ عملية دفع تجريبية
    async function createTrade(type) {
        if (type === 'بيع') { alert("تم تسجيل طلب البيع"); return; }
        
        try {
            await Pi.createPayment({
                amount: 0.1,
                memo: "شراء عملة تجريبية",
                metadata: { type: "trade_test" }
            }, {
                onReadyForServerApproval: (paymentId) => { console.log("Approved", paymentId); },
                onReadyForServerCompletion: (paymentId, txid) => { alert("نجحت العملية! التوقيع: " + txid); },
                onCancel: (paymentId) => { console.log("Cancelled"); },
                onError: (error, payment) => { console.error("Error", error); }
            });
        } catch (err) {
            console.error(err);
        }
    }
</script>

</body>
</html>
