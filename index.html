<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - RPC v2</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #6a1b9a; }
        input { width: 90%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 16px; background: #6a1b9a; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .rpc-status { font-size: 12px; color: #888; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#6a1b9a;">مكتب الفريد الذكي</h2>
    <div id="status" class="rpc-status">Protocol: RPC v2.0 | ISO 20022</div>

    <div id="app-content">
        <input type="number" id="qty" placeholder="أدخل الكمية بالمتر" oninput="calculate()">
        <input type="text" id="amt" readonly placeholder="0.0000000">
        <button class="btn" onclick="payNow()">تأكيد الدفع (Mainnet)</button>
    </div>

    <div id="res" style="display:none; margin-top:15px; color:green; font-weight:bold;">
        ✅ تم الدفع بنجاح!
        <p id="txid" style="font-size:10px; color:#555; word-break:break-all;"></p>
    </div>
</div>

<script>
    const MY_WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    // محاولة الربط في الخلفية بدون تعطيل الواجهة
    Pi.authenticate(['payments', 'username'], (incomplete) => {}).catch(e => console.log("Waiting for Pi Browser..."));

    function calculate() {
        let q = document.getElementById('qty').value;
        if(q > 0) {
            document.getElementById('amt').value = (parseFloat(q) / 314.159).toFixed(7);
        }
    }

    async function payNow() {
        let amount = parseFloat(document.getElementById('amt').value);
        if(!amount) return alert("اكتب الكمية أولاً");

        try {
            await Pi.createPayment({
                amount: amount,
                memo: "AlFareed - RPC v2 Payment",
                metadata: { protocol: "RPC2", wallet: MY_WALLET }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved"),
                onReadyForServerCompletion: (id, tx) => {
                    document.getElementById('app-content').style.display = 'none';
                    document.getElementById('res').style.display = 'block';
                    document.getElementById('txid').innerText = tx;
                },
                onCancel: () => alert("تم الإلغاء"),
                onError: (e) => alert("خطأ في الشبكة: " + e.message)
            });
        } catch (e) { alert("تأكد من فتح التطبيق داخل Pi Browser"); }
    }
</script>
</body>
</html>
