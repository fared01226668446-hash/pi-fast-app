<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - RPC2</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 15px; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .st { padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; font-size: 13px; background: #fff3e0; color: #e65100; }
        .ok { background: #e8f5e9; color: #2e7d32; }
        input, .btn { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn-p { background: #4a148c; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-p:disabled { background: #ccc; }
        .btn-w { background: #25d366; color: white; text-decoration: none; display: block; }
    </style>
</head>
<body>
<div class="card">
    <h2 style="color:#4a148c">مكتب الفريد الذكي</h2>
    <div id="st" class="st">جاري محاولة الربط بالمحفظة...</div>
    <input type="number" id="q" placeholder="الكمية (متر مكعب)" oninput="up()">
    <input type="text" id="a" readonly placeholder="السعر بـ Pi">
    <button id="pb" class="btn btn-p" onclick="pay()" disabled>في انتظار الشبكة...</button>
    <a href="https://wa.me/201551016807" class="btn btn-w">تواصل عبر واتساب</a>
</div>
<script>
    let ready = false;
    const MY_WAL = "GD2JN2VUQTYMIHT53XIZ45SEWH3TZTJDN5ERUN525ATTGHZUKYOFLZTM";

    function init() {
        if (window.Pi) {
            Pi.init({ version: "2.0", sandbox: false });
            Pi.authenticate(['payments'], (auth) => {
                ready = true;
                document.getElementById('st').innerText = "متصل بنجاح ✅";
                document.getElementById('st').className = "st ok";
                document.getElementById('pb').innerText = "إرسال إلى المحفظة";
                document.getElementById('pb').disabled = false;
            }).catch(() => setTimeout(init, 2000));
        } else setTimeout(init, 1000);
    }

    function up() {
        let v = document.getElementById('q').value;
        if(v) document.getElementById('a').value = (v / 314.159).toFixed(7) + " Pi";
    }

    async function pay() {
        let amt = parseFloat(document.getElementById('a').value);
        if(!amt || !ready) return;
        try {
            await Pi.createPayment({
                amount: amt, memo: "توريد خرسانة - الفريد",
                metadata: { type: "Service", to: MY_WAL }
            }, {
                onReadyForServerCompletion: (id, tx) => {
                    alert("نجحت العملية!");
                    window.location.href = `https://wa.me/201551016807?text=تم الدفع للمحفظة: ${tx}`;
                },
                onError: (e) => {}
            });
        } catch (e) {}
    }
    window.onload = init;
</script>
</body>
</html>
