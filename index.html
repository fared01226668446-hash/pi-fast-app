<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف أعطال الفارس</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; text-align: center; }
        #console-log { background: #333; color: #0f0; padding: 10px; border-radius: 10px; text-align: left; font-size: 12px; height: 150px; overflow-y: auto; margin-top: 20px; direction: ltr; }
        .btn { background: #673ab7; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>🚀 فحص اتصال Pi</h2>
    <p>لو الزرار مشغالش، بص على الشاشة السوداء تحت وقولي المكتوب إيه</p>

    <button class="btn" onclick="runLogin()">اضغط هنا للدخول</button>

    <div id="console-log">في انتظار الضغط على الزرار...</div>

    <script>
        // دالة لكتابة الأعطال على الشاشة
        function log(msg) {
            const el = document.getElementById('console-log');
            el.innerHTML += "<br>> " + msg;
        }

        const Pi = window.Pi;

        async function runLogin() {
            log("بدء محاولة تسجيل الدخول...");
            try {
                // محاولة تشغيل الـ SDK
                Pi.init({ version: "2.0", sandbox: true });
                log("تم تشغيل Pi.init بنجاح");

                // طلب التصريح
                const auth = await Pi.authenticate(['username'], function(p){});
                log("نجاح! أهلاً: " + auth.user.username);
                alert("اشتغل يا برنس!");
            } catch (err) {
                log("خطأ حقيقي: " + err.message);
                log("النوع: " + err.name);
            }
        }
    </script>
</body>
</html>
