<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الفارس</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background:#f4f4f9;">
    <h2>🚀 منصة الفارس للتداول</h2>
    <div id="status" style="margin:20px; padding:15px; background:#fff; border-radius:10px; border:1px solid #ddd;">
        جاري فحص الرابط...
    </div>
    <button onclick="login()" style="padding:15px 30px; background:#673ab7; color:white; border:none; border-radius:10px; font-size:18px; cursor:pointer;">
        تسجيل دخول Pi
    </button>

    <script>
        // تهيئة المكتبة بطريقة مرنة
        window.onload = function() {
            try {
                // شلنا القيود اللي بتعمل مشاكل مع الروابط
                window.Pi.init({ version: "2.0", sandbox: true });
                document.getElementById('status').innerText = "✅ جاهز للدخول";
            } catch(e) {
                document.getElementById('status').innerText = "❌ افتح التطبيق من Pi Browser";
            }
        };

        async function login() {
            const status = document.getElementById('status');
            status.innerText = "⏳ جاري محاولة فتح النافذة...";
            try {
                // طلب تسجيل الدخول
                const auth = await window.Pi.authenticate(['username'], function(p){});
                status.innerText = "✅ مبروك! الاسم: " + auth.user.username;
                alert("أهلاً بك يا فارس!");
            } catch (err) {
                status.innerText = "❌ خطأ: " + err.message;
                alert("السبب التقني: " + err.message);
            }
        }
    </script>
</body>
</html>
