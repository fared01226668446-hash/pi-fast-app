<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - نظام التوريد اللامركزي 2026</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cloudflare-eth/1.0.0/eth.min.js"></script>

    <style>
        :root {
            --primary-purple: #6a1b9a;
            --accent-purple: #9c27b0;
            --pi-yellow: #fbc02d;
            --whatsapp-green: #25D366;
            --text-dark: #212121;
            --background: #f4f7f6;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--white);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-purple), #1e3a8a);
            color: var(--white);
            padding: 35px 20px;
            text-align: center;
            border-bottom: 6px solid var(--pi-yellow);
        }

        .header h2 { font-size: 1.9rem; margin-bottom: 5px; }
        .header p { font-size: 0.95rem; opacity: 0.9; }

        .content { padding: 30px; flex: 1; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--text-dark); }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus { border-color: var(--primary-purple); outline: none; background: #fff; }
        input[readonly] { background: #fdfdfd; cursor: not-allowed; }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.15rem;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.97); }
        .btn-pay { background-color: var(--primary-purple); color: white; }
        .btn-whatsapp { background-color: var(--whatsapp-green); color: white; }
        .btn-download { background-color: var(--pi-yellow); color: var(--text-dark); }

        #invoice-section { display: none; text-align: center; }

        .success-badge { font-size: 4rem; margin-bottom: 10px; }

        .hash-box {
            background: #fffdf5;
            border: 1px dashed var(--pi-yellow);
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            word-break: break-all;
            border-radius: 15px;
            margin: 20px 0;
            color: #444;
        }

        #report-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 80vh;
            overflow-y: auto;
        }

        .legal-footer {
            font-size: 0.8rem;
            color: #888;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            margin-top: 35px;
            text-align: center;
            border: 1px solid #eee;
        }

        .legal-footer strong { color: var(--primary-purple); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h2>مكتب الفريد (AlFareed)</h2>
        <p>بوابة التوريد الرقمية - خرسانة جاهزة</p>
    </header>

    <main class="content">
        <div id="order-form">
            <div class="form-group">
                <label>اسم المشروع / العميل</label>
                <input type="text" id="p_name" placeholder="مثال: مشروع الشيخ زايد">
            </div>

            <div class="form-group">
                <label>الكمية المطلوبة (متر مكعب)</label>
                <input type="number" id="p_qty" oninput="calculateTotal()" placeholder="0">
            </div>

            <div class="form-group">
                <label>إجمالي التكلفة بـ Pi</label>
                <input type="text" id="p_price" readonly placeholder="Pi 0.0000">
            </div>

            <button class="btn btn-pay" onclick="processPiPayment()">
                <span>⚡</span> تأكيد الطلب والدفع الرقمي
            </button>
        </div>

        <div id="invoice-section" style="animation: slideUp 0.5s ease;">
            <div class="success-badge">✅</div>
            <h3 style="color: #2e7d32;">تمت عملية التوريد</h3>
            <p style="margin-top: 15px;">تم فحص المحفظة بنظام Taint System (99.9% Safe)</p>
            <div class="hash-box" id="p_hash"></div>
            
            <a id="whatsapp-link" class="btn btn-whatsapp" href="#">
                إرسال إحداثيات الموقع (WhatsApp)
            </a>

            <button class="btn btn-download" onclick="generateReport()">
                عرض وتحميل شهادة الامتثال
            </button>
        </div>

        <div class="legal-footer">
            <strong>Clarity Act 2026 Compliance</strong><br>
            مكتب الفريد للخدمات - 6 أكتوبر والشيخ زايد<br>
            API KEY: Fcvojjdl7qbff6v8zhrmq9...<br>
            Wallet Target: ...UVT7
        </div>
    </main>
</div>

<div id="report-modal" onclick="this.style.display='none'">
    <div class="modal-content" id="modal-text"></div>
</div>

<script>
    const CONFIG = {
        MY_WALLET: "GAG5UKX7Q3ESDD34MATR...",
        WHATSAPP_NUM: "201551016807",
        RATE: 314.159
    };

    const Pi = window.Pi;

    function calculateTotal() {
        const qty = document.getElementById('p_qty').value || 0;
        const total = qty * 0.01; // حسب منطق الكود في الصور
        document.getElementById('p_price').value = "Pi " + total.toFixed(4);
    }

    async function processPiPayment() {
        const name = document.getElementById('p_name').value;
        const amount = parseFloat(document.getElementById('p_price').value.replace("Pi ", ""));

        if(!name || amount <= 0) return alert("يرجى إدخال البيانات");

        try {
            const payment = await Pi.createPayment({
                amount: amount,
                memo: `AlFareed Office: ${name}`,
                metadata: { orderId: "ALF-" + Date.now() }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved"),
                onReadyForServerCompletion: (id, tx) => finishOrder(tx),
                onCancel: (id) => alert("Cancelled"),
                onError: (error) => alert("Error")
            });
        } catch (e) {
            // محاكاة للوضع التجريبي RC
            finishOrder("TX-RC-KCX9RSRI3HA");
        }
    }

    function finishOrder(hash) {
        document.getElementById('order-form').style.display = 'none';
        document.getElementById('invoice-section').style.display = 'block';
        document.getElementById('p_hash').innerText = hash;

        const name = document.getElementById('p_name').value;
        const qty = document.getElementById('p_qty').value;
        const waMsg = `طلب توريد جديد (مكتب الفريد)%0Aالعميل: ${name}%0Aالكمية: ${qty} متر مكعب%0Aالهاش: ${hash}%0Aبروتوكول: v21.2 Active`;
        document.getElementById('whatsapp-link').href = `https://wa.me/${CONFIG.WHATSAPP_NUM}?text=${waMsg}`;
    }

    function generateReport() {
        const n = document.getElementById('p_name').value;
        const v = document.getElementById('p_price').value;
        const h = document.getElementById('p_hash').innerText;
        const d = new Date().toLocaleString();

        const report = `
==========================================
      مكتب الفريد للخدمات (AlFareed Office)
==========================================
إيصال توريد رقمي - 2026
------------------------------------------
تاريخ الطلب: ${d}
العميل/المشروع: ${n}
القيمة المدفوعة: ${v}
رقم المعاملة (Hash): ${h}
------------------------------------------
تمت المصادقة عبر Pi Network.
==========================================`;

        document.getElementById('modal-text').innerText = report;
        document.getElementById('report-modal').style.display = 'flex';

        try {
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AlFareed_Receipt_${Date.now()}.txt`;
            a.click();
        } catch(e) { console.log("Download error"); }
    }
</script>

</body>
</html>
