<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخرسانة الجاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #e65100; --success: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; text-align: center; color: #333; }
        .header { background: var(--primary); color: white; padding: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; }
        .header:hover { background: #121858; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); margin-bottom: 25px; border-right: 6px solid var(--primary); }
        .btn-order { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 19px; cursor: pointer; text-decoration: none; display: block; font-weight: bold; }
        #payout-section { display: none; background: #fff4e5; border: 2px dashed var(--secondary); border-radius: 15px; padding: 20px; animation: slideDown 0.4s ease-out; margin-top: 20px; }
        .status-box { background: #e1bee7; color: #4a148c; padding: 12px; border-radius: 8px; font-weight: bold; margin: 15px 0; font-size: 14px; }
        .btn-execute { background: var(--secondary); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="header" onclick="handleSecretClick()">
    <h1 id="title">مكتب الفريد للخرسانة الجاهزة</h1>
    <p>خدمات أكتوبر والشيخ زايد | 01551016807</p>
</div>

<div class="container">
    <div class="card">
        <h3>طلب توريد خرسانة</h3>
        <p>نحن نوفر خدمات الخرسانة الجاهزة بأعلى جودة في منطقة أكتوبر وزايد.</p>
        <a href="https://wa.me/201551016807" class="btn-order">طلب معاينة عبر واتساب</a>
    </div>

    <div id="payout-section">
        <div class="card" style="border-right-color: var(--secondary);">
            <h2 style="color: var(--secondary);">إدارة السيولة (Mainnet)</h2>
            <p>المستحق الأسبوعي: <strong>150 دولار</strong></p>
            <div id="status-display" class="status-box">جاري تهيئة الـ RPC للمايننت...</div>
            <button id="exec-btn" class="btn-execute" onclick="startSalaryPayout()">تنفيذ السحب وإرسال إشعار</button>
        </div>
    </div>
</div>

<script>
    const Pi = window.Pi;
    
    // إخفاء المحفظة GDSK بتقسيمها برمجياً
    const _partA = "GDSKAED2RIY5VU7YSUFI3CPVAGFVYSIHW";
    const _partB = "5OC456WYED46UWXJEJURIPB";
    const TARGET_WALLET = _partA + _partB; 

    let clickCount = 0;

    window.onload = function() {
        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0", sandbox: false }); 
            document.getElementById('status-display').innerHTML = "الـ RPC متصل بالمايننت ✅";
        } else {
            document.getElementById('status-display').innerHTML = "يرجى فتح التطبيق من Pi Browser.";
        }
    };

    function handleSecretClick() {
        clickCount++;
        if (clickCount >= 5) {
            document.getElementById('payout-section').style.display = 'block';
            clickCount = 0;
            alert("مرحباً أستاذ أحمد، تم تفعيل واجهة الإدارة.");
        }
    }

    async function startSalaryPayout() {
        const status = document.getElementById('status-display');
        const btn = document.getElementById('exec-btn');
        
        try {
            status.innerHTML = "جاري طلب توقيع المعاملة...";
            await Pi.authenticate(['payments', 'username']);
            btn.disabled = true;

            await Pi.createPayment({
                amount: 150,
                memo: "Salary Payout - Al-Fareed Office",
                metadata: { type: "weekly_salary", owner: "Ahmed_Farid" },
                to_address: TARGET_WALLET
            }, {
                onReadyForServerApproval: (id) => { 
                    status.innerHTML = "بانتظار موافقة السيرفر... ID: " + id; 
                },
                onReadyForServerCompletion: (id, txid) => {
                    status.innerHTML = "تم التحويل بنجاح! ✅";
                    btn.innerHTML = "تم الإرسال ✅";
                    
                    const msg = `تم استلام الراتب (150 دولار) بنجاح.\nالمحفظة: ${TARGET_WALLET}\nرقم المعاملة: ${txid}`;
                    const whatsappUrl = `https://wa.me/201551016807?text=${encodeURIComponent(msg)}`;
                    
                    setTimeout(() => {
                        window.location.href = whatsappUrl;
                    }, 2000);
                },
                onCancel: (id) => { 
                    status.innerHTML = "تم إلغاء السحب."; 
                    btn.disabled = false; 
                },
                onError: (err) => { 
                    status.innerHTML = "تأكد من شحن محفظة التطبيق."; 
                    btn.disabled = false; 
                }
            });
        } catch (e) {
            status.innerHTML = "خطأ في الشبكة.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
