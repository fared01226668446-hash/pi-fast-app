<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات الخرسانية</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; border-top: 5px solid #5e2a84; }
        h1 { color: #5e2a84; font-size: 24px; margin-bottom: 10px; }
        .user-info { background: #f8f0ff; padding: 10px; border-radius: 10px; color: #5e2a84; font-weight: bold; margin-bottom: 20px; border: 1px solid #e1d0f5; min-height: 20px; }
        .service-box { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .btn-pi { background-color: #5e2a84; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: 0.3s; margin-bottom: 10px; }
        .btn-whatsapp { background-color: #25d366; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .status { margin-top: 15px; font-size: 14px; font-weight: bold; color: #555; }
        .nav-links { margin-top: 20px; font-size: 12px; }
        .nav-links a { color: #5e2a84; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مكتب الفريد للخرسانة الجاهزة</h1>
    
    <div id="user-display" class="user-info">جاري التحقق من الحساب...</div>

    <div class="service-box">
        <p>خدمة توريد الخرسانة: 6 أكتوبر - الشيخ زايد - حدائق أكتوبر</p>
        
        <button class="btn-pi" onclick="transferPi()">دفع 1 Pi (تجريبي)</button>
        
        <a href="https://wa.me/201226668446" class="btn-whatsapp">
            تواصل عبر الواتساب للطلب 💬
        </a>
    </div>

    <div id="status" class="status"></div>

    <div class="nav-links">
        <a href="privacy.html">سياسة الخصوصية</a>
    </div>
</div>

<script>
    // 1. تهيئة الـ SDK
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    // 2. الـ API Key الخاص بك (تم التأكد من الصور التي أرسلتها)
    const MY_API_KEY = "vlanhm8y9vhbv3fjrv59u82nm78uofgrbimzp2doyt47kfu7dqsh91avwgz6ndqm";

    // 3. دالة دخول المستخدم
    async function authenticateUser() {
        try {
            const scopes = ['payments', 'username'];
            const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
            document.getElementById('user-display').innerText = `أهلاً بك: ${user.user.username}`;
        } catch (err) {
            document.getElementById('user-display').innerText = "يرجى فتح التطبيق من متصفح Pi Browser";
            console.error(err);
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("هناك دفع معلق:", payment);
    }

    // 4. دالة عملية الدفع
    async function transferPi() {
        const statusDiv = document.getElementById('status');
        statusDiv.style.color = "#5e2a84";
        statusDiv.innerText = "جاري فتح المحفظة...";

        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "طلب توريد خرسانة - مكتب الفريد",
                metadata: { order_type: "concrete_order", api_key: MY_API_KEY.substring(0, 10) },
            }, {
                onReadyForServerApproval: (paymentId) => {
                    statusDiv.innerText = "بانتظار موافقة الشبكة...";
                    console.log("رقم الدفع للمراجعة:", paymentId);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    statusDiv.style.color = "green";
                    statusDiv.innerText = "تم الدفع بنجاح! رقم المعاملة: " + txid.substring(0, 10);
                },
                onCancel: (paymentId) => {
                    statusDiv.style.color = "orange";
                    statusDiv.innerText = "تم إلغاء عملية الدفع.";
                },
                onError: (error, payment) => {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "حدث خطأ في الدفع. تأكد من وجود رصيد Testnet.";
                    console.error(error);
                }
            });
        } catch (err) {
            console.error("خطأ تقني:", err);
        }
    }

    // تشغيل المصادقة فور التحميل
    authenticateUser();
</script>

</body>
</html>
