<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد الذكي - RPC2</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --primary: #4a148c; --whatsapp: #25d366; }
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .status-msg { font-size: 13px; font-weight: bold; margin-bottom: 20px; padding: 12px; border-radius: 12px; background: #fff3e0; color: #e65100; transition: 0.5s; }
        .header-box { font-size: 16px; font-weight: bold; color: white; padding: 14px; border-radius: 15px; margin: 15px 0; background: var(--primary); }
        input { width: 90%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 15px; font-size: 17px; text-align: center; outline: none; }
        .pay-btn { width: 100%; padding: 18px; color: white; border: none; border-radius: 18px; font-weight: bold; font-size: 18px; cursor: pointer; background: var(--primary); box-shadow: 0 5px 15px rgba(74,20,140,0.3); }
        .whatsapp-btn { background: var(--whatsapp); display: block; text-decoration: none; margin-top: 25px; border-radius: 18px; padding: 18px; color: white; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--primary); margin: 0;">مكتب الفريد الذكي</h2>
    <p style="font-size: 11px; color: #888; margin-bottom: 10px;">V21.2 | RPC2 System Ready</p>
    
    <div id="status" class="status-msg">جاري فحص الاتصال بالشبكة...</div>

    <div id="main-ui">
        <div class="header-box">طلب توريد خرسانة (Service)</div>
        <input type="number" id="qty" placeholder="أدخل الكمية (متر مكعب)" oninput="calculatePrice()">
        <input type="text" id="amt" readonly placeholder="السعر بـ Pi">
        <button class="pay-btn" onclick="processPayment()">تأكيد دفع RPC2</button>
        <a href="https://wa.me/201551016807" class="whatsapp-btn">تواصل واتساب مباشر</a>
    </div>

    <div id="success-ui" style="display:none; padding: 20px;">
        <div style="font-size: 60px;">✅</div>
        <h3 style="color: var(--primary);">تم تأكيد الدفع بنجاح</h3>
        <p id="tx-id" style="font-size: 11px; background: #f9f9f9; padding: 15px; border-radius: 10px; word-break: break-all;"></p>
        <p>جاري تحويلك لتأكيد الحجز عبر واتساب...</p>
    </div>
</div>

<script>
    const TARGET_PHONE = "201551016807";
    let isPiReady = false;

    // وظيفة الربط التلقائي لحل مشكلة "خطأ التوثيق"
    function autoConnect() {
        if (window.Pi && window.Pi.init) {
            Pi.init({ version: "2.0", sandbox: false });
            Pi.authenticate(['payments', 'username'], (auth) => {
                isPiReady = true;
                const s = document.getElementById('status');
                s.innerText = "متصل بنجاح ✅ - نظام RPC2 نشط";
                s.style.background = "#e8f5e9";
                s.style.color = "#2e7d32";
            }).catch(() => {
                setTimeout(autoConnect, 1500); // إعادة المحاولة تلقائياً لتفادي رسائل الخطأ
            });
        } else {
            setTimeout(autoConnect, 1000);
        }
    }

    function calculatePrice() {
        let q = document.getElementById('qty').value;
        if(q) {
            document.getElementById('amt').value = (parseFloat(q) / 314.159).toFixed(7) + " Pi";
        }
    }

    async function processPayment() {
        if (!isPiReady) return alert("الربط ما زال جارياً.. انتظر حتى تظهر العلامة الخضراء");
        
        let amount = parseFloat(document.getElementById('amt').value);
        if(!amount || amount <= 0) return alert("يرجى إدخال الكمية أولاً");

        try {
            await Pi.createPayment({
                amount: amount,
                memo: "حجز توريد خرسانة - مكتب الفريد",
                metadata: { protocol: "RPC2", type: "Service", node_version: "21.2" }
            }, {
                onReadyForServerCompletion: (id, txid) => {
                    document.getElementById('main-ui').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'block';
                    document.getElementById('tx-id').innerText = "رقم العملية: " + txid;
                    
                    let msg = `تم دفع الطلب بنجاح ✅\nالكمية: ${document.getElementById('qty').value} م³\nالمبلغ: ${amount} Pi\nالعملية: ${txid}`;
                    setTimeout(() => {
                        window.location.href = `https://wa.me/${TARGET_PHONE}?text=${encodeURIComponent(msg)}`;
                    }, 3000);
                },
                onError: (err) => { alert("حدث خطأ في الشبكة، يرجى المحاولة لاحقاً"); }
            });
        } catch (e) {
            alert("يرجى فتح التطبيق من متصفح Pi الرسمي");
        }
    }

    window.onload = autoConnect;
</script>

</body>
</html>
