<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات | خرسانة جاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; }
        h1 { color: #5e35b1; font-size: 26px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 25px; }
        .status-box { padding: 15px; margin-bottom: 20px; border-radius: 12px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .loading { background: #fff3e0; color: #ef6c00; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        #auth-btn { background-color: #5e35b1; color: white; border: none; padding: 16px 32px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; display: none; box-shadow: 0 4px 15px rgba(94, 53, 177, 0.3); }
        #auth-btn:active { transform: scale(0.98); }
        #user-info { display: none; margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; border: 1px solid #ddd; }
        .welcome-msg { color: #5e35b1; font-size: 18px; margin-bottom: 10px; }
        #user-name { font-size: 22px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>مكتب الفريد للخدمات</h1>
    <div class="subtitle">تطبيقات توريد الخرسانة - أكتوبر والشيخ زايد</div>
    
    <div id="status-box" class="status-box loading">جاري الاتصال بشركة Pi...</div>

    <button id="auth-btn" onclick="handleLogin()">تسجيل الدخول باستخدام Pi</button>

    <div id="user-info">
        <div class="welcome-msg">مرحباً بك يا عمي:</div>
        <div id="user-name"></div>
        <p style="color: #666; font-size: 14px; margin-top: 15px;">تم التحقق من حسابك بنجاح ✅</p>
    </div>
</div>

<script>
    const statusBox = document.getElementById('status-box');
    const authBtn = document.getElementById('auth-btn');
    const userInfo = document.getElementById('user-info');
    const userNameDisplay = document.getElementById('user-name');

    // 1. تشغيل المكتبة فور تحميل الصفحة
    window.onload = async function() {
        try {
            // تفعيل sandbox: true للاختبار
            await Pi.init({ version: "2.0", sandbox: true });
            console.log("Pi SDK Initialized");
            
            statusBox.innerText = "متصل بالشبكة بنجاح ✅";
            statusBox.className = "status-box success";
            authBtn.style.display = "block";
        } catch (err) {
            statusBox.innerText = "خطأ: تأكد من فتح التطبيق داخل Pi Browser";
            statusBox.className = "status-box error";
        }
    };

    // 2. وظيفة تسجيل الدخول
    async function handleLogin() {
        statusBox.innerText = "جاري التحقق من هويتك...";
        try {
            const scopes = ['username', 'payments', 'wallet_address'];
            function onIncompletePaymentFound(payment) { /* للتعامل مع المدفوعات لاحقاً */ }

            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            // إخفاء العناصر القديمة وإظهار بيانات المستخدم
            statusBox.style.display = "none";
            authBtn.style.display = "none";
            userInfo.style.display = "block";
            userNameDisplay.innerText = auth.user.username;

        } catch (err) {
            statusBox.innerText = "فشل التحقق، حاول مرة أخرى";
            statusBox.className = "status-box error";
        }
    }
</script>

</body>
</html>
