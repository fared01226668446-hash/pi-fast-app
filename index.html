<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد - النظام الموحد</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #6a1b9a; --y: #fbc02d; --w: #25D366; --d: #1e3a8a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; }
        .card { width: 100%; max-width: 420px; background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ddd; }
        .header { background: linear-gradient(135deg, var(--p), var(--d)); color: #fff; padding: 20px; text-align: center; border-bottom: 4px solid var(--y); }
        .tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; }
        .tab.active { background: #fff; color: var(--p); border-bottom: 3px solid var(--p); }
        .content { padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-l { background: var(--y); color: #222; }
        .btn-s { background: var(--p); color: #fff; }
        .btn-w { background: var(--w); color: #fff; }
        #res { display: none; text-align: center; }
        .h { font-size: 0.7rem; background: #f8f9fa; padding: 10px; border-radius: 8px; word-break: break-all; margin: 10px 0; border: 1px dashed #ccc; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h3>مكتب الفريد الذكي</h3>
        <p>بوابة السيولة والخدمات (Protocol 21)</p>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="t(0)">السيولة الشخصية</div>
        <div class="tab" onclick="t(1)">خدمات التوريد</div>
    </div>
    <div class="content">
        <div id="s0" class="section active">
            <div style="background:#e8f5e9; padding:15px; border-radius:12px; margin-bottom:15px; text-align:center;">
                <small>رصيد السيولة</small>
                <h3 id="bal">0.00 Pi</h3>
            </div>
            <input type="number" id="la" placeholder="أدخل كمية Pi">
            <button class="btn btn-l" onclick="ex('la','دمج سيولة')"><i class="fas fa-link"></i> دمج للمحفظة</button>
            <button class="btn btn-s" style="background:var(--d)" onclick="ex('la','سحب نقد')"><i class="fas fa-money-bill-wave"></i> طلب سحب نقد</button>
        </div>
        <div id="s1" class="section">
            <input type="text" id="pn" placeholder="اسم الموقع">
            <input type="number" id="pq" placeholder="الكمية بالمتر" oninput="c()">
            <input type="text" id="pp" readonly placeholder="التكلفة">
            <button class="btn btn-s" onclick="ex('pp','توريد فوري')"><i class="fas fa-truck"></i> تنفيذ دفع</button>
        </div>
        <div id="res">
            <i class="fas fa-check-circle" style="font-size:3rem; color:var(--w);"></i>
            <h3 id="rt">نجحت العملية</h3>
            <div class="h" id="rh"></div>
            <button class="btn btn-w" id="wb">مراسلة المكتب</button>
            <button class="btn" onclick="location.reload()">عملية جديدة</button>
        </div>
    </div>
</div>

<script>
    const C = { W: "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ", P: "201551016807", G: 314.159 };
    const Pi = window.Pi;
    
    // تأكد من أن الـ Sandbox مفعل فقط إذا كنت تختبر بدون محفظة حقيقية
    Pi.init({ version: "2.0", sandbox: false });

    // وظيفة الربط الإجباري عند الضغط على أي زر
    async function checkAuth() {
        try {
            await Pi.authenticate(['payments', 'username'], (p) => {
                console.log("إشعار دفعة غير مكتملة");
            });
            return true;
        } catch (e) {
            alert("يرجى فتح التطبيق من داخل Pi Browser");
            return false;
        }
    }

    function t(i){
        document.querySelectorAll('.tab').forEach((x,j)=>x.classList.toggle('active',i===j));
        document.querySelectorAll('.section').forEach((x,j)=>x.classList.toggle('active',i===j));
    }

    function c(){ 
        let q = document.getElementById('pq').value; 
        document.getElementById('pp').value = (q / C.G).toFixed(7); 
    }

    async function ex(id, type){
        // 1. التأكد من الربط أولاً
        const isConnected = await checkAuth();
        if(!isConnected) return;

        let val = document.getElementById(id).value;
        let amount = parseFloat(val);
        if(!amount || amount <= 0) return alert("أدخل مبلغ صحيح");

        try {
            // 2. طلب الدفع الرسمي
            await Pi.createPayment({
                amount: amount,
                memo: type + " - مكتب الفريد",
                metadata: { action: type }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved ID: " + id),
                onReadyForServerCompletion: (id, tx) => f(tx, type, amount),
                onCancel: () => console.log("User Cancelled"),
                onError: (e) => f("INTERNAL-TX-" + Date.now(), type, amount)
            });
        } catch(e) {
            // في حالة الفشل نفتح الواتساب بالبيانات يدوياً لضمان حقك
            f("MANUAL-CHECK-" + Date.now(), type, amount);
        }
    }

    function f(h, t, a){
        document.querySelector('.tabs').style.display='none';
        document.querySelectorAll('.section').forEach(s=>s.style.display='none');
        document.getElementById('res').style.display='block';
        document.getElementById('rh').innerText = h;
        document.getElementById('rt').innerText = t;
        let m = `إشعار الفريد:%0Aالعملية: ${t}%0Aالقيمة: ${a} Pi%0Aالهاش: ${h}`;
        document.getElementById('wb').onclick = () => window.open(`https://wa.me/${C.P}?text=${m}`);
    }
</script>
</body>
</html>
