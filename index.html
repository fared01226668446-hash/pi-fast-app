<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخدمات</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .logo { width: 70px; height: 70px; background: #673ab7; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px; font-weight: bold; }
        .btn { background-color: #673ab7; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        #status { margin-top: 20px; color: #666; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">P</div>
        <h2>مكتب الفريد للخدمات</h2>
        <button class="btn" onclick="login()">دخول عبر شبكة Pi</button>
        <div id="status">جاهز للاتصال..</div>
    </div>

    <script>
        const Pi = window.Pi;
        // السطر 28 كما طلبت يا هندسة
        Pi.init({ version: "2.0", sandbox: false }); 

        async function login() {
            const status = document.getElementById("status");
            status.innerHTML = "⏳ جاري التحقق من الهوية..";
            
            try {
                const scopes = ['username'];
                const onIncompletePaymentFound = (payment) => { };

                // تنفيذ الربط الفعلي
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                status.innerHTML = "✅ أهلاً بك: " + auth.user.username;
                status.style.color = "#2e7d32";
            } catch (err) {
                status.innerHTML = "❌ فشل التوثيق: " + err.message;
                status.style.color = "#d32f2f";
                console.error(err);
            }
        }
    </script>
</body>
</html>
