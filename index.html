<script>
    const statusBox = document.getElementById('statusBox');
    const authBtn = document.getElementById('authBtn');
    const userInfo = document.getElementById('userInfo');
    const userName = document.getElementById('userName');
    const userAddr = document.getElementById('userAddr');

    const Pi = window.Pi;

    try {
        Pi.init({ version: "2.0", sandbox: true });
        statusBox.innerText = "متصل ببيئة Pi بنجاح.";
        statusBox.className = "status status-success";
        authBtn.style.display = "block";
    } catch (e) {
        statusBox.innerText = "خطأ في تحميل الشبكة";
        statusBox.className = "status status-error";
    }

    authBtn.onclick = async function() {
        statusBox.innerText = "...جاري التحقق";
        statusBox.className = "status status-wait";
        try {
            const scopes = ['username', 'payments', 'wallet_address'];
            function onIncompletePaymentFound(payment) { };
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

            statusBox.style.display = "none";
            authBtn.style.display = "none";
            userInfo.style.display = "block";
            userName.innerText = auth.user.username;
            userAddr.innerText = auth.user.uid.substring(0, 8) + "...";
        } catch (error) {
            statusBox.innerText = "فشل تسجيل الدخول";
            statusBox.className = "status status-error";
        }
    };
</script>
