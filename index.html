<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد الذكي - واجهة نظيفة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --primary: #4a148c; --secondary: #0277bd; --success: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 25px; padding: 15px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 8px solid var(--primary); }
        .status-msg { font-size: 13px; padding: 10px; margin-bottom: 15px; border-radius: 12px; background: #fff3e0; color: #e65100; font-weight: bold; }
        .section-header { font-size: 15px; font-weight: bold; color: white; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .bg-purple { background: var(--primary); }
        .bg-blue { background: var(--secondary); }
        .bg-green { background: var(--success); }
        input { width: 90%; padding: 12px; margin: 5px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; text-align: center; outline: none; }
        .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 5px; }
        .liquidity-box { border: 1px dashed var(--success); padding: 10px; border-radius: 15px; margin-top: 15px; }
        #res { display: none; padding: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--primary); margin: 5px 0;">مكتب الفريد الذكي</h2>
    <div id="status" class="status-msg">انتظار الربط بمتصفح Pi...</div>

    <div id="main-ui">
        <div class="section-header bg-purple">طلب توريد خرسانة (Service)</div>
        <input type="number" id="qty" placeholder="أدخل الكمية المطلوبة">
        <input type="text" id="amt" readonly placeholder="السعر سيظهر هنا">
        <button class="btn bg-purple" onclick="pay('Service')">تأكيد دفع الخدمة</button>

        <div class="section-header bg-blue">الصرف الشهري المستحق (RPC2)</div>
        <input type="number" id="allowance_val" placeholder="أدخل مبلغ السحب">
        <button class="btn bg-blue" onclick="pay('Allowance')">سحب الصرف الشهري</button>

        <div class="liquidity-box">
            <button class="btn bg-green" style="padding: 10px; font-size: 14px;" onclick="pay('Liquidity')">نقل السيولة للشبكة (RPC v2)</button>
        </div>
    </div>

    <div id="res">
        <div style="font-size: 50px;">✅</div>
        <h3 style="color: var(--success);">نجحت العملية!</h3>
        <p id="tx-id" style="font-size: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; word-break: break-all;"></p>
    </div>
</div>

<script>
    const WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    const PHONE = "201551016807";

    window.onload = function() {
        setInterval(() => {
            if (window.Pi) {
                Pi.init({ version: "2.0", sandbox: false });
                Pi.authenticate(['payments', 'username'], (auth) => {
                    document.getElementById('status').innerText = "متصل بنجاح ✅";
                    document.getElementById('status').style.background = "#e8f5e9";
                    document.getElementById('status').style.color = "#2e7d32";
                });
            }
        }, 1000);
    };

    document.getElementById('qty').oninput = function() {
        let q = this.value;
        if(q) document.getElementById('amt').value = (q / 314.159).toFixed(7) + " Pi";
    };

    async function pay(type) {
        let amount, memo;
        if(type === 'Service') {
            amount = parseFloat(document.getElementById('amt').value);
            memo = "توريد خرسانة - مكتب الفريد";
        } else if(type === 'Allowance') {
            amount = parseFloat(document.getElementById('allowance_val').value);
            memo = "سحب صرف شهري RPC2";
        } else {
            amount = 0.001;
            memo = "دعم السيولة ISO20022";
        }

        if(!amount || amount <= 0) return alert("يرجى إدخال البيانات أولاً");

        try {
            await Pi.createPayment({
                amount: amount,
                memo: memo,
                metadata: { protocol: "RPC2" }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved"),
                onReadyForServerCompletion: (id, txid) => {
                    document.getElementById('main-ui').style.display = 'none';
                    document.getElementById('res').style.display = 'block';
                    document.getElementById('tx-id').innerText = txid;
                    window.location.href = `https://wa.me/${PHONE}?text=${encodeURIComponent("تمت العملية بنجاح: " + txid)}`;
                },
                onCancel: () => { alert("تم الإلغاء"); },
                onError: (e) => { alert("فشل: تأكد من الرصيد"); }
            });
        } catch (e) { alert("خطأ في الربط"); }
    }
</script>

</body>
</html>
