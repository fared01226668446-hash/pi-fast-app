<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - RPC2 Final Edition</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; }
        .card { width: 100%; max-width: 450px; background: #fff; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #6a1b9a; }
        .section-title { font-size: 14px; font-weight: bold; color: #fff; margin: 15px 0 5px; padding: 10px; border-radius: 8px; }
        .service-bg { background: #6a1b9a; }
        .liquidity-bg { background: #007bff; }
        .allowance-bg { background: #0288d1; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 15px; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        #res { display: none; margin-top: 15px; background: #e8f5e9; padding: 15px; border-radius: 12px; color: #2e7d32; }
        .status-bar { font-size: 11px; color: #d32f2f; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#6a1b9a; margin-bottom:5px;">مكتب الفريد الذكي</h2>
    <div class="status-bar" id="status">جاري الاتصال بـ Pi Browser...</div>

    <div id="main-ui">
        <div class="section-title service-bg">طلب توريد خرسانة (Services)</div>
        <input type="number" id="qty" placeholder="الكمية (متر مكعب)" oninput="calculate()" inputmode="decimal">
        <input type="text" id="amt" readonly placeholder="السعر بـ Pi">
        <button class="btn service-bg" onclick="payNow('Service')">تأكيد دفع الخدمة</button>

        <div class="section-title allowance-bg">الصرف الشهري المستحق (RPC2)</div>
        <input type="number" id="allowance_amount" placeholder="المبلغ المراد صرفه" inputmode="decimal">
        <button class="btn allowance-bg" onclick="payNow('Allowance')">سحب الصرف الشهري</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">

        <div class="section-title liquidity-bg">دعم حوض السيولة (Liquidity)</div>
        <input type="number" id="liq_qty" placeholder="كمية السيولة المراد نقلها" inputmode="decimal">
        <button class="btn liquidity-bg" onclick="payNow('Liquidity')">نقل إلى حوض السيولة</button>
    </div>

    <div id="res">
        <p style="font-weight: bold;">✅ تمت العملية بنجاح!</p>
        <p id="tx-info" style="font-size: 10px; color: #444; word-break: break-all;"></p>
        <button id="wa-btn" class="btn" style="background: #25D366;">إرسال الهاش عبر واتساب</button>
        <button class="btn" style="background: #666;" onclick="location.reload()">العودة للرئيسية</button>
    </div>
</div>

<script>
    const MY_WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    const MY_PHONE = "201551016807";
    const Pi = window.Pi;
    
    // الحل النهائي لمشكلة "تأكد من استخدام Pi Browser"
    window.onload = function() {
        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0", sandbox: false });
            
            // التوثيق الصامت فور التحميل لإثبات الهوية للمتصفح
            Pi.authenticate(['payments', 'username'], (incomplete) => {
                document.getElementById('status').innerText = "RPC v2.0: Connected & Active";
                document.getElementById('status').style.color = "#2e7d32";
            }).catch((err) => {
                document.getElementById('status').innerText = "يرجى التحديث من داخل Pi Browser";
            });
        }
    };

    function calculate() {
        let q = document.getElementById('qty').value;
        if(q > 0) {
            let result = (parseFloat(q) / 314.159).toFixed(7);
            document.getElementById('amt').value = result + " Pi";
        }
    }

    async function payNow(type) {
        let amount, memo, category;
        
        if(type === 'Service') {
            let val = document.getElementById('amt').value.replace(" Pi", "");
            amount = parseFloat(val);
            memo = "توريد خرسانة - مكتب الفريد RPC2";
            category = "Service Request";
        } else if(type === 'Allowance') {
            amount = parseFloat(document.getElementById('allowance_amount').value);
            memo = "سحب مخصصات صرف شهري - RPC2";
            category = "Monthly Allowance Claim";
        } else {
            amount = parseFloat(document.getElementById('liq_qty').value);
            memo = "دعم حوض السيولة - ISO 20022";
            category = "Liquidity Pool";
        }

        if(!amount || amount <= 0) return alert("يرجى إدخال مبلغ صحيح");

        try {
            await Pi.createPayment({
                amount: amount,
                memo: memo,
                metadata: { protocol: "RPC2", type: category, wallet: MY_WALLET }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved"),
                onReadyForServerCompletion: (id, tx) => showSuccess(tx, amount, category),
                onCancel: () => console.log("Cancelled"),
                onError: (e) => alert("فشل الاتصال: " + e.message)
            });
        } catch (e) {
            alert("خطأ: يرجى تحديث الصفحة والمحاولة مرة أخرى.");
        }
    }

    function showSuccess(tx, a, cat) {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('res').style.display = 'block';
        document.getElementById('tx-info').innerText = "الهاش: " + tx;
        
        let message = `مرحبا مكتب الفريد،\nتمت عملية: ${cat}\nالمبلغ: ${a} Pi\nالهاش: ${tx}\nنظام: RPC2`;
        document.getElementById('wa-btn').onclick = () => {
            window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(message)}`);
        };
    }
</script>

</body>
</html>
