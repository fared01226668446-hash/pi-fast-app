<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتب الفريد للخرسانة الجاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --main: #673ab7; --gold: #ffa500; }
        body { background: var(--main); color: white; font-family: Arial; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: rgba(255,255,255,0.15); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; margin: 10px 0; box-sizing: border-box; }
        .btn { background: var(--gold); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .status { background: white; color: #333; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>الفريد للخرسانة الجاهزة</h2>
    <p>أكتوبر - الشيخ زايد - حدائق أكتوبر</p>
    <div id="status" class="status">في انتظار دخول Pi...</div>

    <div id="order-form" style="display:none;">
        <input type="number" id="meters" placeholder="كمية الخرسانة (متر مكعب)">
        <input type="text" id="location" placeholder="العنوان بالتفصيل">
        <button class="btn" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
    </div>

    <button id="login-btn" class="btn" onclick="login()">دخول وطلب خرسانة</button>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function login() {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], (p) => console.log(p));
            document.getElementById('status').innerText = "أهلاً بك: " + auth.user.username;
            document.getElementById('login-btn').style.display = "none";
            document.getElementById('order-form').style.display = "block";
        } catch (err) { alert("افتح التطبيق من Pi Browser"); }
    }

    function sendOrder() {
        const m = document.getElementById('meters').value;
        const loc = document.getElementById('location').value;
        if(!m || !loc) return alert("اكمل البيانات");
        
        // --- ضع رقمك الجديد هنا مكان الأصفار ---
        const myPhone = "201000000000"; 
        
        const msg = `طلب خرسانة جديد:%0Aالكمية: ${m} متر%0Aالموقع: ${loc}`;
        window.open(`https://wa.me/${myPhone}?text=${msg}`, '_blank');
    }

    // حل مشكلة حذف الشرطة المائلة وتجنب الـ 404
    if (window.location.pathname.includes('404.html')) {
        window.history.replaceState(null, null, '/pi-fast-app/');
    }
</script>
</body>
</html>
