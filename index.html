<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة الجاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; color: #1c1e21; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #5e35b1; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #65676b; font-size: 14px; margin-bottom: 20px; }
        .logo-box { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #5e35b1; margin: 0 auto 20px; overflow: hidden; background: #eee; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-main { background-color: #5e35b1; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background-color: #4527a0; }
        .order-panel { display: none; text-align: right; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .price-display { background: #e7f3ff; color: #1877f2; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-page">
        <h1>الفريد للخرسانة الجاهزة</h1>
        <p class="subtitle">خدمة التوريد الذكي - 6 أكتوبر والشيخ زايد</p>
        
        <div class="logo-box">
            <img src="https://images.unsplash.com/photo-1533045339241-10c0e395408a?auto=format&fit=crop&q=80&w=300" alt="Al-Fareed">
        </div>

        <button onclick="startPiLogin()" class="btn-main">دخول بواسطة Pi Network</button>
    </div>

    <div id="order-page" class="order-panel">
        <h3>إنشاء طلب خرسانة جديد</h3>
        
        <label>منطقة المشروع:</label>
        <select id="project-area">
            <option value="october">6 أكتوبر / حدائق أكتوبر</option>
            <option value="zayed">الشيخ زايد</option>
            <option value="industrial">المنطقة الصناعية</option>
        </select>

        <label>نوع الخرسانة:</label>
        <select id="concrete-type" onchange="updateTotal()">
            <option value="250">إجهاد 250 (لبشة/عادية)</option>
            <option value="350" selected>إجهاد 350 (أعمدة/سقف)</option>
            <option value="400">إجهاد 400 (أبراج/كبارى)</option>
        </select>

        <label>الكمية (متر مكعب):</label>
        <input type="number" id="m3-qty" placeholder="مثلاً: 60" oninput="updateTotal()">

        <div class="price-display" id="total-val">إجمالي السعر: 0 Pi</div>
        
        <button class="btn-main" style="margin-top:20px;" onclick="confirmOrder()">تأكيد وإرسال للمكتب</button>
    </div>
</div>

<script>
    // معرف تطبيقك الرسمي
    const APP_ID = "Rpw64depyijqsodpwojsg4fdlpsr30kwr7dgofebvb6bosepvw77nvsp9t4lqjyt";
    
    Pi.init({ version: "2.0", sandbox: true });

    async function startPiLogin() {
        try {
            const user = await Pi.authenticate(['username', 'payments'], onProcessPayment);
            alert("تم الدخول بنجاح.. أهلاً بك يا " + user.username);
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('order-page').style.display = 'block';
        } catch (e) {
            alert("يا برنس، افتح الرابط من داخل تطبيق Pi Browser!");
        }
    }

    function updateTotal() {
        const qty = document.getElementById('m3-qty').value;
        const priceFactor = document.getElementById('concrete-type').value;
        if(qty > 0) {
            const result = (qty * (priceFactor / 1000)).toFixed(4);
            document.getElementById('total-val').innerText = "إجمالي السعر: " + result + " Pi";
        }
    }

    function confirmOrder() {
        alert("طلبك قيد المراجعة.. سيتم التواصل معك من محطة أكتوبر لتأكيد موعد الصبة.");
    }

    function onProcessPayment(payment) {
        // معالجة المدفوعات لمحفظة GDSKA
    }
</script>

</body>
</html>
