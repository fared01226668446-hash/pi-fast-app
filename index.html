<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #5e35b1; margin-bottom: 15px; }
        button { background: #5e35b1; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.w3schools.com/howto/img_avatar.png" class="logo" alt="الفريد">
        <h1>مكتب الفريد للخدمات</h1>
        <p>توريد خرسانة جاهزة - أكتوبر وزايد</p>
        <button onclick="login()">دخول بواسطة Pi Network</button>
    </div>

    <script>
        const PI_APP_ID = "Rpw64depyijqsodpwojsg4fdlpsr30kwr7dgofebvb6bosepvw77nvsp9t4lqjyt";
        Pi.init({ version: "2.0", sandbox: true });
        async function login() {
            try {
                const user = await Pi.authenticate(['username'], (p)=>{});
                alert('أهلاً بك يا برنس ' + user.username);
            } catch (e) {
                alert('افتح من Pi Browser يا برنس!');
            }
        }
    </script>
</body>
</html>
