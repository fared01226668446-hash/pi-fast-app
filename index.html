<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة الجاهزة</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --main-bg: #e6e6e6; /* لون خلفية هادئ */
            --primary-color: #673ab7; /* لون Pi البنفسجي */
            --secondary-color: #ff9800; /* لون برتقالي */
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        #status {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s, transform 0.1s;
        }

        .btn:hover {
            background-color: #512da8;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #order-form {
            display: none; /* مخفي حتى تسجيل الدخول */
            margin-top: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .pi-icon {
            font-size: 1.5em;
            vertical-align: middle;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>الفريد للخرسانة الجاهزة <span class="pi-icon">π</span></h2>
        <p>مرحباً بكم في تطبيق الفريد لطلب الخرسانة في أكتوبر، الشيخ زايد، وحدائق أكتوبر.</p>
        
        <div id="status">الرجاء تسجيل الدخول أولاً</div>
        <button id="login-btn" class="btn" onclick="login()">دخول وطلب خرسانة</button>

        <div id="order-form">
            <input type="number" id="meters" placeholder="كمية الخرسانة (بالمتر المكعب)">
            <input type="text" id="location" placeholder="عنوان الموقع بالتفصيل">
            <button class="btn" onclick="sendOrder()">إرسال الطلب</button>
        </div>
    </div>

    <script>
        // تعريف متغير لـ Pi
        const Pi = window.Pi;

        // الخطوة 1: تهيئة الـ SDK
        // (التعديل الوحيد هنا: تغيير sandbox ليكون true)
        Pi.init({ version: "2.0", sandbox: true });

        // الخطوة 2: وظيفة تسجيل الدخول
        async function login() {
            const statusDiv = document.getElementById('status');
            const loginBtn = document.getElementById('login-btn');
            const orderForm = document.getElementById('order-form');

            try {
                // طلب الصلاحيات الأساسية
                const scopes = ['payments', 'username'];
                
                // بدء تسجيل الدخول
                statusDiv.innerText = "جاري الاتصال بـ Pi Network...";
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                // في حال النجاح
                statusDiv.innerText = `مرحباً بك: ${auth.user.username}`;
                loginBtn.style.display = 'none'; // إخفاء زر الدخول
                orderForm.style.display = 'block'; // إظهار واجهة الطلب
            } catch (err) {
                // في حال حدوث خطأ
                console.error(err);
                statusDiv.innerText = `خطأ في الدخول. تأكد من فتح الرابط داخل Pi Browser.`;
            }
        }

        // الخطوة 3: التعامل مع المدفوعات غير المكتملة
        function onIncompletePaymentFound(payment) {
            console.log("هناك مدفوعات معلقة", payment);
            // (اختياري: يمكنك إضافة كود هنا للتعامل مع المدفوعات المعلقة)
        }

        // الخطوة 4: وظيفة إرسال الطلب
        function sendOrder() {
            const meters = document.getElementById('meters').value;
            const location = document.getElementById('location').value;

            if (!meters || !location) {
                alert("الرجاء ملء كافة البيانات المطلوبة");
                return;
            }

            const alertMessage = `تم استلام طلبك! ${meters} متر خرسانة لموقع: ${location}. سيتم التواصل معك قريباً.`;
            alert(alertMessage);
        }
    </script>
</body>
</html>
