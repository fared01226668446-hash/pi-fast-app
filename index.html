<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - RPC v2 Integrated</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #6a1b9a; }
        .section-title { font-size: 14px; font-weight: bold; color: #6a1b9a; margin: 15px 0 5px; background: #f3e5f5; padding: 8px; border-radius: 8px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 15px; background: #6a1b9a; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-liq { background: #007bff; }
        #res { display: none; margin-top: 15px; background: #e8f5e9; padding: 15px; border-radius: 12px; color: #2e7d32; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#6a1b9a;">مكتب الفريد الذكي</h2>
    <div id="protocol-status" style="font-size: 11px; color: #888; margin-bottom: 10px;">RPC v2.0 | ISO 20022 Standard</div>

    <div id="main-ui">
        <div class="section-title">طلب توريد خرسانة (Services)</div>
        <input type="number" id="qty" placeholder="الكمية (متر مكعب)" oninput="calculate()" inputmode="decimal">
        <input type="text" id="amt" readonly placeholder="السعر بـ Pi">
        <button class="btn" onclick="payNow('Service')">تأكيد دفع الخدمة (RPC v2)</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">

        <div class="section-title">دعم حوض السيولة (Liquidity)</div>
        <input type="number" id="liq_qty" placeholder="كمية السيولة المراد نقلها" inputmode="decimal">
        <button class="btn btn-liq" onclick="payNow('Liquidity')">نقل إلى حوض السيولة (RPC v2)</button>
    </div>

    <div id="res">
        <p style="font-weight: bold;">✅ تمت العملية بنجاح!</p>
        <p id="tx-info" style="font-size: 10px; color: #444; word-break: break-all;"></p>
        <button id="wa-btn" class="btn" style="background: #25D366;">إرسال الهاش عبر واتساب</button>
    </div>
</div>

<script>
    const MY_WALLET = "GAG5UKX7Q3ESDD34MATRC3EQ2RSEMCZSLI6Y7K4XRF6NJGQBML25UVTZ";
    const MY_PHONE = "201551016807";
    const Pi = window.Pi;
    
    // تهيئة النظام ودمج RPC v2 صراحة
    window.onload = function() {
        Pi.init({ version: "2.0", sandbox: false });
        Pi.authenticate(['payments', 'username'], (incomplete) => {
            document.getElementById('protocol-status').innerText = "RPC v2.0: Connected & Active";
        }).catch(() => {
            console.log("Waiting for Pi Browser...");
        });
    };

    function calculate() {
        let q = document.getElementById('qty').value;
        if(q > 0) {
            let result = (parseFloat(q) / 314.159).toFixed(7);
            document.getElementById('amt').value = result + " Pi";
        }
    }

    async function payNow(type) {
        let amount, memo, category;
        
        if(type === 'Service') {
            let val = document.getElementById('amt').value.replace(" Pi", "");
            amount = parseFloat(val);
            memo = "Concrete Service Delivery - RPC v2.0";
            category = "Service Request";
        } else {
            amount = parseFloat(document.getElementById('liq_qty').value);
            memo = "Liquidity Pool Support - ISO 20022 Compliant";
            category = "Liquidity Pool";
        }

        if(!amount || amount <= 0) return alert("يرجى إدخال كمية صحيحة");

        try {
            // دمج الـ RPC و ISO داخل الـ Payment Metadata
            await Pi.createPayment({
                amount: amount,
                memo: memo,
                metadata: { 
                    protocol: "RPC v2.0", 
                    standard: "ISO 20022", 
                    type: category, 
                    wallet: MY_WALLET 
                }
            }, {
                onReadyForServerApproval: (id) => console.log("RPC Approval: " + id),
                onReadyForServerCompletion: (id, tx) => showSuccess(tx, amount, category),
                onCancel: () => alert("تم إلغاء العملية"),
                onError: (e) => alert("خطأ في بروتوكول RPC: " + e.message)
            });
        } catch (e) {
            alert("تنبيه: تأكد من استخدام متصفح Pi الرسمي لتفعيل RPC.");
        }
    }

    function showSuccess(tx, a, cat) {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('res').style.display = 'block';
        document.getElementById('tx-info').innerText = "الهاش: " + tx;
        
        let message = `مرحبا مكتب الفريد،\nتم تنفيذ عملية ${cat}\nالمبلغ: ${a} Pi\nالهاش: ${tx}\nProtocol: RPC v2.0`;
        document.getElementById('wa-btn').onclick = () => {
            window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(message)}`);
        };
    }
</script>

</body>
</html>
