<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الفارس</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background:#f4f4f9;">
    <h2>🚀 منصة الفارس للتداول</h2>
    <div id="info" style="margin:20px; padding:15px; background:#fff; border-radius:10px;">
        جاري فحص الاتصال...
    </div>
    <button onclick="login()" style="padding:15px 30px; background:#673ab7; color:white; border:none; border-radius:10px; font-size:18px;">
        تسجيل دخول Pi
    </button>

    <script>
        // هنا السر: لازم تتأكد إن الـ Sandbox شغال
        window.onload = function() {
            try {
                window.Pi.init({ version: "2.0", sandbox: true });
                document.getElementById('info').innerText = "المكتبة جاهزة.. اضغط دخول ✅";
            } catch(e) {
                document.getElementById('info').innerText = "خطأ في الاتصال ❌";
            }
        };

        async function login() {
            try {
                // المحاولة دي هتفتح نافذة Pi الرسمية
                const auth = await window.Pi.authenticate(['username', 'payments'], function(p){});
                document.getElementById('info').innerText = "تم الدخول: " + auth.user.username;
                alert("مبروك يا هندسة! اشتغل");
            } catch (err) {
                // لو ظهرت رسالة هنا، قولي مكتوب فيها إيه بالظبط
                alert("سبب الرفض: " + err.message);
            }
        }
    </script>
</body>
</html>
