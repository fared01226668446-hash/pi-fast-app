<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد للخرسانة الجاهزة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-purple: #673ab7;
            --overlay: rgba(0, 0, 0, 0.65);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* الخلفية الميدانية (صورتك مع المعدات) */
        .background-container {
            background-image: linear-gradient(var(--overlay), var(--overlay)), 
                              url('1000023962.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 85%;
            max-width: 380px;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.8s ease-out;
        }

        /* صورة البروفايل (صورتك الشخصية) */
        .avatar-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border: 5px solid var(--pi-purple);
            border-radius: 50%;
            overflow: hidden;
            background: #eee;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.6rem;
            color: #222;
            margin: 10px 0;
            font-weight: 800;
        }

        .subtitle {
            color: #555;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .pi-button {
            background-color: var(--pi-purple);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(103, 58, 183, 0.3);
        }

        .pi-button:active {
            transform: scale(0.96);
        }

        /* أنيميشن اللودر */
        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="background-container">
    <div class="login-card">
        <div class="avatar-container">
            <img src="1000023961.jpg" alt="المكتب">
        </div>
        
        <h1>مكتب الفريد للخدمات</h1>
        <p class="subtitle">توريد خرسانة جاهزة<br><b>أكتوبر - الشيخ زايد - حدائق أكتوبر</b></p>

        <button class="pi-button" id="auth-btn" onclick="handleLogin()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">دخول بواسطة Pi Network</span>
        </button>
        
        <p id="status-msg" style="margin-top:15px; font-size:0.85rem; display:none;"></p>
    </div>
</div>

<script>
    // تهيئة الـ SDK
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false }); // sandbox: false للعمل الفعلي داخل Pi Browser

    async function handleLogin() {
        const btn = document.getElementById('auth-btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const statusMsg = document.getElementById('status-msg');

        // بدء حالة التحميل
        btn.disabled = true;
        loader.style.display = 'block';
        btnText.innerText = 'جاري التحقق...';

        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePayment);
            
            statusMsg.style.display = 'block';
            statusMsg.style.color = 'green';
            statusMsg.innerText = "أهلاً بك يا " + auth.user.username;

            // الانتقال لصفحة الطلبات بعد ثانية واحدة من النجاح
            setTimeout(() => {
                window.location.href = "order.html"; 
            }, 1500);

        } catch (error) {
            console.error(error);
            loader.style.display = 'none';
            btn.disabled = false;
            btnText.innerText = 'حاول مرة أخرى';
            statusMsg.style.display = 'block';
            statusMsg.style.color = 'red';
            statusMsg.innerText = "خطأ: تأكد من فتح التطبيق من Pi Browser";
        }
    }

    function onIncompletePayment(payment) {
        console.log("Incomplete payment found", payment);
    }
</script>

</body>
</html>
