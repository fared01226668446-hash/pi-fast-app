<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريد للخرسانة</title>
    <style>
        body { font-family: Arial; background: #673ab7; color: white; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }
        .btn { background: #ff9800; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>الفريد للخرسانة الجاهزة</h2>
        <p>أكتوبر - زايد - حدائق أكتوبر</p>
        
        <input type="number" id="m" placeholder="الكمية (متر)">
        <input type="text" id="l" placeholder="العنوان بالتفصيل">
        
        <button class="btn" onclick="orderNow()">اضغط لطلب الخرسانة عبر واتساب</button>
    </div>

    <script>
        function orderNow() {
            const meters = document.getElementById('m').value;
            const location = document.getElementById('l').value;
            if(!meters || !location) return alert("اكتب الكمية والعنوان");

            const phone = "201551016807";
            const text = `طلب جديد من تطبيق الفريد:%0Aالكمية: ${meters} متر%0Aالموقع: ${location}`;
            
            // فتح الواتساب مباشرة دون انتظار Pi
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
