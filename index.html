<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - RPC2</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --primary: #4a148c; --success: #2e7d32; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .status-indicator { font-size: 13px; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .waiting { background: #fff3e0; color: #ef6c00; }
        .ready { background: #e8f5e9; color: var(--success); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-pay { background: var(--primary); color: white; }
        .btn-pay:disabled { background: #ccc; cursor: not-allowed; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; display: block; }
        input { width: 90%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--primary);">مكتب الفريد الذكي</h2>
    <div id="stat" class="status-indicator waiting">جاري تهيئة الاتصال...</div>

    <input type="number" id="qty" placeholder="الكمية (متر مكعب)" oninput="calc()">
    <input type="text" id="amt" readonly placeholder="السعر بـ Pi">

    <button id="payBtn" class="btn btn-pay" onclick="pay()" disabled>انتظر الربط...</button>
    <a href="https://wa.me/201551016807" class="btn btn-wa">تواصل واتساب</a>
</div>

<script>
    let isConnected = false;
    const WA = "201551016807";

    function initPi() {
        if (window.Pi) {
            Pi.init({ version: "2.0", sandbox: false });
            Pi.authenticate(['payments', 'username'], (auth) => {
                isConnected = true;
                const s = document.getElementById('stat');
                s.innerText = "متصل بنجاح ✅";
                s.className = "status-indicator ready";
                const b = document.getElementById('payBtn');
                b.innerText = "تأكيد الدفع";
                b.disabled = false;
            }).catch(() => {
                // إعادة المحاولة بصمت كل ثانيتين دون إظهار رسائل خطأ
                setTimeout(initPi, 2000);
            });
        } else {
            setTimeout(initPi, 1000);
        }
    }

    function calc() {
        let q = document.getElementById('qty').value;
        if(q) document.getElementById('amt').value = (parseFloat(q) / 314.159).toFixed(7) + " Pi";
    }

    async function pay() {
        let val = parseFloat(document.getElementById('amt').value);
        if(!val) return;

        try {
            await Pi.createPayment({
                amount: val,
                memo: "توريد خرسانة - RPC2",
                metadata: { type: "Service", node: "21.2" }
            }, {
                onReadyForServerCompletion: (id, tx) => {
                    alert("تم الدفع بنجاح!");
                    window.location.href = `https://wa.me/${WA}?text=تم الدفع بنجاح ✅\nالعملية: ${tx}`;
                },
                onError: (e) => {} // تجاهل الأخطاء العابرة
            });
        } catch (e) {}
    }

    window.onload = initPi;
</script>
</body>
</html>
