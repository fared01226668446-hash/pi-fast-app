<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - Pi App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top: 50px; background-color: #f4f4f4; font-family: Arial, sans-serif;">

    <div style="background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 400px;">
        <h2 style="color: #673ab7;">مكتب الفريد</h2>
        <p>مشروع التداول - شبكة باي</p>
        <p style="color: gray; font-size: 12px;">الرابط: fared01226668446-hash</p>

        <button id="login-btn" onclick="login()" style="background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%;">
            تسجيل الدخول عبر Pi
        </button>

        <h4 id="status" style="margin-top: 20px; color: #555;"></h4>
    </div>

    <script>
        // تهيئة تطبيق Pi
        const Pi = window.Pi;
        // ملاحظة: جعلنا sandbox false ليعمل على الشبكة بشكل صحيح
        Pi.init({ version: "2.0", sandbox: false });

        async function login() {
            const statusLabel = document.getElementById("status");
            statusLabel.innerText = "جاري التحقق من حسابك...";
            statusLabel.style.color = "blue";

            try {
                // طلب تسجيل الدخول من المستخدم
                const scopes = ['username', 'payments'];
                
                // هذه الدالة تتعامل مع المدفوعات غير المكتملة (مهمة جداً)
                const onIncompletePaymentFound = (payment) => { 
                    console.log("Incomplete payment found", payment);
                };

                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusLabel.innerText = "مرحباً: " + auth.user.username;
                statusLabel.style.color = "green";
                
                // هنا يمكنك توجيه المستخدم لصفحة التداول أو لوحة التحكم
                console.log("تم تسجيل الدخول بنجاح لـ:", auth.user.username);

            } catch (err) {
                statusLabel.innerText = "حدث خطأ أثناء الدخول. حاول مجدداً.";
                statusLabel.style.color = "red";
                console.error(err);
            }
        }
    </script>
</body>
</html>
